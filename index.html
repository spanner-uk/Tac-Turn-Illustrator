<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Double Assisted Tactical Turn</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #18211f;
      --muted: #596460;
      --line: #d8dfdc;
      --soft: #edf1ef;
      --a1: #d95f43;
      --a1-soft: rgba(217, 95, 67, 0.32);
      --a2: #1f7a8c;
      --a2-soft: rgba(31, 122, 140, 0.32);
      --focus: #2e6f58;
      --shadow: 0 18px 45px rgba(35, 47, 44, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1440px, 100%);
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 16px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 12px 20px;
    }

    .headline {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .title-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .title-row h1 {
      min-width: 0;
    }

    .info-button {
      display: grid;
      place-items: center;
      flex: none;
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--panel);
      color: var(--focus);
      font-size: 0.88rem;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(35, 47, 44, 0.08);
    }

    .info-button:hover,
    .info-button:focus-visible {
      border-color: var(--focus);
      outline: none;
    }

    .info-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 30;
      width: min(430px, calc(100vw - 40px));
      max-height: min(58vh, 420px);
      overflow: auto;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--ink);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .info-popover p {
      margin: 0 0 12px;
    }

    .info-item {
      margin-top: 7px;
      font-weight: 800;
    }

    .info-pro {
      color: #2e6f58;
    }

    .info-con {
      color: #b42318;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      white-space: nowrap;
    }

    .segmented.tabs {
      width: 100%;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      overflow: hidden;
    }

    .segmented.tabs label {
      grid-column: span 4;
      min-width: 0;
    }

    .segmented.tabs.secondary-tabs label {
      grid-column: span 3;
    }

    .segmented.tabs span {
      white-space: nowrap;
    }

    .maneuver-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      gap: 8px;
      background: var(--bg);
    }

    .time-card {
      min-width: 172px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(35, 47, 44, 0.08);
      text-align: right;
    }

    .time-card span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .time-card strong {
      display: block;
      margin-top: 2px;
      font-size: 1.65rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(250px, 310px) 1fr;
      gap: 16px;
      overflow: hidden;
    }

    .controls {
      min-width: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      align-self: stretch;
      overflow: auto;
    }

    .control-group {
      padding: 14px 0;
      border-bottom: 1px solid var(--soft);
    }

    .control-group:first-child {
      padding-top: 0;
    }

    .control-group:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .control-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
    }

    output {
      color: var(--muted);
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--focus);
    }

    select {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented span {
      display: grid;
      place-items: center;
      min-height: 34px;
      padding: 6px 8px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .segmented input:checked + span {
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(35, 47, 44, 0.1);
    }

    .mode {
      grid-template-columns: 1fr;
    }

    .mode span {
      justify-content: start;
      place-items: center start;
      padding-left: 12px;
    }

    .disabled {
      opacity: 0.45;
    }

    [hidden] {
      display: none !important;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--focus);
      flex: 0 0 auto;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fbfcfb;
      box-shadow: var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      left: 14px;
      top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(216, 223, 220, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }

    .swatch {
      width: 22px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }

    .legend-item:first-child {
      color: var(--a1);
    }

    .legend-item:nth-child(2) {
      color: var(--a2);
    }

    .diagram-options {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      justify-content: flex-end;
    }

    .diagram-range {
      width: 180px;
      padding: 8px 10px 9px;
      border: 1px solid rgba(216, 223, 220, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    .diagram-range-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .diagram-range input {
      display: block;
      width: 100%;
      accent-color: var(--focus);
    }

    .diagram-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid rgba(216, 223, 220, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 800;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
    }

    .diagram-toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--focus);
    }

    .scrubber {
      display: grid;
      grid-template-columns: 44px 1fr minmax(142px, auto);
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(35, 47, 44, 0.1);
    }

    .icon-button {
      width: 44px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .icon-button:focus-visible,
    .segmented span:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(46, 111, 88, 0.28);
      outline-offset: 2px;
    }

    .play-symbol,
    .pause-symbol {
      display: block;
      width: 18px;
      height: 18px;
      position: relative;
    }

    .play-symbol::before {
      content: "";
      position: absolute;
      inset: 2px 1px 2px 4px;
      border-left: 13px solid var(--ink);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .pause-symbol::before,
    .pause-symbol::after {
      content: "";
      position: absolute;
      top: 2px;
      bottom: 2px;
      width: 5px;
      background: var(--ink);
      border-radius: 2px;
    }

    .pause-symbol::before {
      left: 3px;
    }

    .pause-symbol::after {
      right: 3px;
    }

    .time-readout {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .app {
        padding: 14px;
      }

      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .time-card {
        width: 100%;
        text-align: left;
      }

      .workspace {
        display: grid;
        grid-template-rows: minmax(260px, 1fr) minmax(150px, auto);
      }

      .controls {
        order: 2;
        max-height: 34vh;
      }

      .stage {
        min-height: 0;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .tabs span {
        min-height: 32px;
        padding: 5px 6px;
        font-size: 0.8rem;
      }

      .stage {
        min-height: 0;
      }

      .scrubber {
        grid-template-columns: 42px 1fr;
      }

      .time-readout {
        grid-column: 1 / -1;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="maneuver-nav" aria-label="Maneuver type">
      <div class="segmented tabs" role="tablist">
        <label>
          <input type="radio" name="maneuver" value="double" checked>
          <span tabindex="0">Double assisted</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="assisted">
          <span tabindex="0">Assisted</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="unassisted">
          <span tabindex="0">Unassisted</span>
        </label>
      </div>
      <div class="segmented tabs secondary-tabs" role="tablist">
        <label>
          <input type="radio" name="maneuver" value="hook">
          <span tabindex="0">Hook</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="cross180">
          <span tabindex="0">Cross</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="check">
          <span tabindex="0">Check</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="shackle">
          <span tabindex="0">Shackle</span>
        </label>
      </div>
    </nav>

    <header class="topbar">
      <div class="headline">
        <div class="title-row">
          <h1 id="pageTitle">Double Assisted Tactical Turn</h1>
          <button class="info-button" type="button" id="infoToggle" aria-label="Show maneuver information" aria-expanded="false" aria-controls="maneuverInfo" title="Maneuver information">i</button>
          <div class="info-popover" id="maneuverInfo" role="tooltip" hidden></div>
        </div>
        <div class="meta" aria-live="polite">
          <span class="pill" id="turnTimeSummary">Turn time 0.0 s</span>
          <span class="pill" id="blindspotTimeSummary">Time in blindspot 0.0 s</span>
          <span class="pill" id="radiusSummary">Radius 0.0 NM</span>
          <span class="pill" id="turnProfileSummary">Turn 0.0 G</span>
          <span class="pill" id="completionSpacingSummary">Spacing 0.0 NM</span>
        </div>
      </div>
      <div class="time-card" aria-live="polite">
        <span>Elapsed</span>
        <strong id="elapsedLarge">0.0 s</strong>
      </div>
    </header>

    <section class="workspace">
      <aside class="controls" aria-label="Maneuver controls">
        <div class="control-group" id="turnAngleGroup">
          <div class="control-heading">
            <label for="turnAngle">Turn angle</label>
            <output id="turnAngleValue" for="turnAngle">45 deg</output>
          </div>
          <input id="turnAngle" type="range" min="20" max="70" step="1" value="45">
        </div>

        <div class="control-group" id="directionGroup">
          <div class="control-heading">Direction</div>
          <div class="segmented" role="radiogroup" aria-label="Turn direction">
            <label>
              <input type="radio" name="direction" value="left" checked>
              <span tabindex="0">Left</span>
            </label>
            <label>
              <input type="radio" name="direction" value="right">
              <span tabindex="0">Right</span>
            </label>
          </div>
        </div>

        <div class="control-group" id="firstTurnGroup">
          <div class="control-heading">First turn</div>
          <div class="segmented mode" role="radiogroup" aria-label="First turn timing">
            <label>
              <input type="radio" name="firstStart" value="simultaneous" checked>
              <span tabindex="0">Simultaneous</span>
            </label>
            <label>
              <input type="radio" name="firstStart" value="outside-first">
              <span tabindex="0" title="Inside aircraft's first turn begins after outside aircraft completes first turn (wings level)">Outside first</span>
            </label>
          </div>
        </div>

        <div class="control-group" id="overturnGroup">
          <div class="control-heading">
            <label for="overturn">Overturn</label>
            <output id="overturnValue" for="overturn">20 deg</output>
          </div>
          <input id="overturn" type="range" min="0" max="45" step="1" value="20">
          <label class="toggle-row" for="overturnHalfAngle">
            <span>Lock to 50% of turn angle</span>
            <input id="overturnHalfAngle" type="checkbox">
          </label>
        </div>

        <div class="control-group" id="separationGroup">
          <div class="control-heading">
            <label for="separation">Spacing</label>
            <output id="separationValue" for="separation">1.0 NM</output>
          </div>
          <input id="separation" type="range" min="0.5" max="5" step="0.1" value="1">
        </div>

        <div class="control-group">
          <div class="control-heading">
            <label for="speed">Contract speed</label>
            <output id="speedValue" for="speed">420 kt</output>
          </div>
          <input id="speed" type="range" min="180" max="600" step="10" value="420">
        </div>

        <div class="control-group">
          <div class="control-heading">
            <label for="aircraft">Aircraft</label>
            <output id="aircraftGValue" for="aircraft">4.5 G MIL</output>
          </div>
          <select id="aircraft">
            <option value="f16Block20">F-16C</option>
            <option value="fa18c" selected>F/A-18C</option>
            <option value="f14b">F-14B</option>
          </select>
        </div>

        <div class="control-group">
          <div class="control-heading">
            <label for="turnLoadFactor">Sustained turn G</label>
            <output id="turnLoadFactorValue" for="turnLoadFactor">4.5 G</output>
          </div>
          <input id="turnLoadFactor" type="range" min="2" max="7.5" step="0.1" value="4.5">
        </div>

        <div class="control-group" id="secondTurnGroup">
          <div class="control-heading" id="secondTurnHeading">Second turn</div>
          <div class="segmented mode" role="radiogroup" aria-label="Second turn trigger">
            <label>
              <input type="radio" name="mode" value="optimum" checked>
              <span tabindex="0">Optimum</span>
            </label>
            <label>
              <input type="radio" name="mode" value="cross">
              <span tabindex="0">At crossing</span>
            </label>
            <label>
              <input type="radio" name="mode" value="blindspot">
              <span tabindex="0">At blindspot</span>
            </label>
            <label>
              <input type="radio" name="mode" value="fixed">
              <span tabindex="0">Fixed wait</span>
            </label>
          </div>
        </div>

        <div class="control-group" id="fixedWaitGroup">
          <div class="control-heading">
            <label for="fixedWait" id="fixedWaitLabel">Wait after first turn completed</label>
            <output id="fixedWaitValue" for="fixedWait">3.0 s</output>
          </div>
          <input id="fixedWait" type="range" min="0" max="20" step="0.5" value="3">
        </div>

      </aside>

      <div class="stage" id="stage">
        <canvas id="plot" aria-label="Animated tactical turn plot"></canvas>
        <div class="diagram-options">
          <div class="diagram-range">
            <div class="diagram-range-heading">
              <label for="blindspotSize">Blindspot</label>
              <output id="blindspotSizeValue" for="blindspotSize">30 deg</output>
            </div>
            <input id="blindspotSize" type="range" min="15" max="180" step="5" value="30">
          </div>
          <label class="diagram-toggle" for="showBlindspots">
            <input id="showBlindspots" type="checkbox">
            <span>Show blindspots</span>
          </label>
        </div>
        <div class="legend" aria-hidden="true">
          <span class="legend-item"><span class="swatch"></span><span id="a1LegendLabel">A1</span></span>
          <span class="legend-item"><span class="swatch"></span><span id="a2LegendLabel">A2</span></span>
        </div>
      </div>
    </section>

    <footer class="scrubber">
      <button class="icon-button" type="button" id="playPause" aria-label="Play" title="Play">
        <span class="play-symbol" aria-hidden="true"></span>
      </button>
      <input id="timeSlider" type="range" min="0" max="1" step="0.1" value="0" aria-label="Elapsed time in seconds">
      <output class="time-readout" id="timeReadout" for="timeSlider">0.0 / 0.0 s</output>
    </footer>
  </main>

  <script>
    const KNOTS_TO_FEET_PER_SECOND = 1.68780986;
    const FEET_PER_NM = 6076.11549;
    const GRAVITY_FTPS2 = 32.174;
    const MIN_TURN_RADIUS_NM = 0.08;
    const FINAL_LEAD_SECONDS = 8;
    // Practical MIL-turn starting points; exact Ps=0 G varies with altitude, weight, stores, and temperature.
    const AIRCRAFT_PROFILES = {
      f16Block20: {
        label: "F-16C",
        milSustainedG: 4.8,
        maxTurnG: 9
      },
      fa18c: {
        label: "F/A-18C",
        milSustainedG: 4.5,
        maxTurnG: 7.5
      },
      f14b: {
        label: "F-14B",
        milSustainedG: 4.5,
        maxTurnG: 6.5
      }
    };

    const elements = {
      stage: document.getElementById("stage"),
      canvas: document.getElementById("plot"),
      pageTitle: document.getElementById("pageTitle"),
      infoToggle: document.getElementById("infoToggle"),
      maneuverInfo: document.getElementById("maneuverInfo"),
      turnAngleGroup: document.getElementById("turnAngleGroup"),
      turnAngle: document.getElementById("turnAngle"),
      turnAngleValue: document.getElementById("turnAngleValue"),
      directionGroup: document.getElementById("directionGroup"),
      firstTurnGroup: document.getElementById("firstTurnGroup"),
      overturnGroup: document.getElementById("overturnGroup"),
      overturn: document.getElementById("overturn"),
      overturnValue: document.getElementById("overturnValue"),
      overturnHalfAngle: document.getElementById("overturnHalfAngle"),
      separationGroup: document.getElementById("separationGroup"),
      separation: document.getElementById("separation"),
      separationValue: document.getElementById("separationValue"),
      speed: document.getElementById("speed"),
      speedValue: document.getElementById("speedValue"),
      aircraft: document.getElementById("aircraft"),
      aircraftGValue: document.getElementById("aircraftGValue"),
      turnLoadFactor: document.getElementById("turnLoadFactor"),
      turnLoadFactorValue: document.getElementById("turnLoadFactorValue"),
      secondTurnGroup: document.getElementById("secondTurnGroup"),
      secondTurnHeading: document.getElementById("secondTurnHeading"),
      fixedWait: document.getElementById("fixedWait"),
      fixedWaitLabel: document.getElementById("fixedWaitLabel"),
      fixedWaitValue: document.getElementById("fixedWaitValue"),
      fixedWaitGroup: document.getElementById("fixedWaitGroup"),
      timeSlider: document.getElementById("timeSlider"),
      timeReadout: document.getElementById("timeReadout"),
      blindspotSize: document.getElementById("blindspotSize"),
      blindspotSizeValue: document.getElementById("blindspotSizeValue"),
      showBlindspots: document.getElementById("showBlindspots"),
      a1LegendLabel: document.getElementById("a1LegendLabel"),
      a2LegendLabel: document.getElementById("a2LegendLabel"),
      elapsedLarge: document.getElementById("elapsedLarge"),
      turnTimeSummary: document.getElementById("turnTimeSummary"),
      blindspotTimeSummary: document.getElementById("blindspotTimeSummary"),
      radiusSummary: document.getElementById("radiusSummary"),
      turnProfileSummary: document.getElementById("turnProfileSummary"),
      completionSpacingSummary: document.getElementById("completionSpacingSummary"),
      playPause: document.getElementById("playPause")
    };

    const ctx = elements.canvas.getContext("2d");
    let params = readParams();
    let route = buildRoute(params);
    let elapsed = 0;
    let activeTrigger = null;
    let playing = false;
    let lastFrameTime = 0;
    let viewport = { width: 1, height: 1, dpr: 1 };

    function radians(deg) {
      return (deg * Math.PI) / 180;
    }

    function degrees(rad) {
      return (rad * 180) / Math.PI;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function add(a, b) {
      return { x: a.x + b.x, y: a.y + b.y };
    }

    function sub(a, b) {
      return { x: a.x - b.x, y: a.y - b.y };
    }

    function scale(v, amount) {
      return { x: v.x * amount, y: v.y * amount };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function forward(heading) {
      return { x: Math.cos(heading), y: Math.sin(heading) };
    }

    function leftNormal(heading) {
      return { x: -Math.sin(heading), y: Math.cos(heading) };
    }

    function formatSeconds(value) {
      return `${value.toFixed(1)} s`;
    }

    function formatNm(value) {
      return `${value.toFixed(1)} NM`;
    }

    function formatDegrees(value) {
      return `${Number.isInteger(value) ? value.toFixed(0) : value.toFixed(1)} deg`;
    }

    function formatG(value) {
      return `${value.toFixed(1)} G`;
    }

    function normalizeRadians(value) {
      const fullTurn = Math.PI * 2;
      return ((value % fullTurn) + fullTurn) % fullTurn;
    }

    function getAircraftProfile(key) {
      return AIRCRAFT_PROFILES[key] || AIRCRAFT_PROFILES.fa18c;
    }

    function getTurnBankDeg(loadFactor) {
      return degrees(Math.acos(1 / Math.max(loadFactor, 1.0001)));
    }

    function readParams() {
      const maneuverInput = document.querySelector("input[name='maneuver']:checked");
      const maneuverType = maneuverInput ? maneuverInput.value : "double";
      const directionInput = document.querySelector("input[name='direction']:checked");
      const firstStartInput = document.querySelector("input[name='firstStart']:checked");
      const modeInput = document.querySelector("input[name='mode']:checked");
      const aircraftKey = elements.aircraft.value;
      const aircraft = getAircraftProfile(aircraftKey);
      const turnLoadFactor = clamp(Number(elements.turnLoadFactor.value), 1.01, aircraft.maxTurnG);
      const angleMin = maneuverType === "check" ? 1 : 20;
      const angleMax = maneuverType === "unassisted" || maneuverType === "check" ? 90 : 70;
      let angleDeg = Number(elements.turnAngle.value);
      if (needsTurnAngleControl(maneuverType)) {
        elements.turnAngle.min = String(angleMin);
        elements.turnAngle.max = String(angleMax);
      }
      if (needsTurnAngleControl(maneuverType)) {
        angleDeg = clamp(angleDeg, angleMin, angleMax);
        elements.turnAngle.value = String(angleDeg);
      }
      const lockOverturnToHalf = elements.overturnHalfAngle.checked;
      const overturnDeg = lockOverturnToHalf ? angleDeg / 2 : Number(elements.overturn.value);
      const blindspotDeg = Number(elements.blindspotSize.value);
      return {
        maneuverType,
        angleDeg,
        angleRad: radians(angleDeg),
        overturnDeg,
        overturnRad: radians(overturnDeg),
        lockOverturnToHalf,
        direction: directionInput ? directionInput.value : "left",
        sign: directionInput && directionInput.value === "right" ? -1 : 1,
        separation: Number(elements.separation.value),
        speedKts: Number(elements.speed.value),
        speedNmPerSec: Number(elements.speed.value) / 3600,
        aircraftKey,
        aircraftLabel: aircraft.label,
        aircraftMilSustainedG: aircraft.milSustainedG,
        aircraftMaxTurnG: aircraft.maxTurnG,
        turnLoadFactor,
        turnBankDeg: getTurnBankDeg(turnLoadFactor),
        firstStartMode: firstStartInput ? firstStartInput.value : "simultaneous",
        mode: modeInput ? modeInput.value : "cross",
        fixedWait: Number(elements.fixedWait.value),
        blindspotDeg,
        blindspotRad: radians(blindspotDeg),
        showBlindspots: elements.showBlindspots.checked
      };
    }

    function makeArc(startTime, startPoint, startHeading, turnSign, angle, radius, speed) {
      const duration = (radius * angle) / speed;
      const center = add(startPoint, scale(leftNormal(startHeading), turnSign * radius));
      const endHeading = startHeading + turnSign * angle;
      const endPoint = sub(center, scale(leftNormal(endHeading), turnSign * radius));
      return {
        type: "arc",
        startTime,
        endTime: startTime + duration,
        duration,
        startPoint,
        startHeading,
        turnSign,
        angle,
        radius,
        center,
        endPoint,
        endHeading
      };
    }

    function makeLine(startTime, startPoint, heading, duration, speed) {
      const safeDuration = Math.max(0, duration);
      const endPoint = add(startPoint, scale(forward(heading), speed * safeDuration));
      return {
        type: "line",
        startTime,
        endTime: startTime + safeDuration,
        duration: safeDuration,
        startPoint,
        heading,
        endPoint,
        endHeading: heading
      };
    }

    function stateOnSegment(segment, time, speed) {
      const local = clamp(time - segment.startTime, 0, segment.duration);
      if (segment.type === "line") {
        return {
          point: add(segment.startPoint, scale(forward(segment.heading), speed * local)),
          heading: segment.heading
        };
      }

      const swept = segment.radius > 0 ? (speed * local) / segment.radius : 0;
      const heading = segment.startHeading + segment.turnSign * swept;
      return {
        point: sub(segment.center, scale(leftNormal(heading), segment.turnSign * segment.radius)),
        heading
      };
    }

    function stateAt(segments, time, speed) {
      const segment = segments.find((item) => time <= item.endTime + 0.0001) || segments[segments.length - 1];
      return stateOnSegment(segment, time, speed);
    }

    function appendLine(segments, startTime, endTime, speed) {
      const last = segments[segments.length - 1];
      if (endTime <= startTime + 0.0001) {
        return;
      }
      segments.push(makeLine(startTime, last.endPoint, last.endHeading, endTime - startTime, speed));
    }

    function solveLineIntersection(p1, h1, p2, h2) {
      const v1 = forward(h1);
      const v2 = forward(h2);
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const det = (v2.x * v1.y) - (v1.x * v2.y);
      if (Math.abs(det) < 0.000001) {
        return null;
      }
      const s1 = ((v2.x * dy) - (v2.y * dx)) / det;
      const s2 = ((v1.x * dy) - (v1.y * dx)) / det;
      return {
        a1Distance: s1,
        a2Distance: s2,
        point: add(p1, scale(v1, s1))
      };
    }

    function solveEqualSpacingDelay(spacingAtDelay, targetSpacing, searchDuration) {
      const tolerance = 0.001;
      let previousDelay = 0;
      let previousResult = spacingAtDelay(previousDelay);
      let previousDiff = previousResult.completionSpacing - targetSpacing;
      let nearestDelay = previousDelay;
      let nearestResult = previousResult;
      let nearestDiff = previousDiff;

      if (Math.abs(previousDiff) <= tolerance) {
        return {
          available: true,
          delayAfterFirstComplete: previousDelay,
          result: previousResult
        };
      }

      let bracket = null;
      const steps = clamp(Math.ceil(searchDuration / 0.25), 260, 5000);
      const scanStep = searchDuration / steps;
      for (let index = 1; index <= steps; index += 1) {
        const delay = (searchDuration * index) / steps;
        const result = spacingAtDelay(delay);
        const diff = result.completionSpacing - targetSpacing;

        if (Math.abs(diff) < Math.abs(nearestDiff)) {
          nearestDelay = delay;
          nearestResult = result;
          nearestDiff = diff;
        }

        if (Math.abs(diff) <= tolerance) {
          return {
            available: true,
            delayAfterFirstComplete: delay,
            result
          };
        }

        if ((previousDiff < 0 && diff > 0) || (previousDiff > 0 && diff < 0)) {
          bracket = {
            lowDelay: previousDelay,
            highDelay: delay,
            lowDiff: previousDiff,
            highDiff: diff
          };
          break;
        }

        previousDelay = delay;
        previousResult = result;
        previousDiff = diff;
      }

      if (!bracket) {
        const refined = refineNearestSpacingDelay(
          spacingAtDelay,
          targetSpacing,
          Math.max(0, nearestDelay - scanStep),
          Math.min(searchDuration, nearestDelay + scanStep)
        );
        if (Math.abs(refined.diff) <= tolerance) {
          return {
            available: true,
            delayAfterFirstComplete: refined.delay,
            result: refined.result
          };
        }
        return {
          available: false,
          delayAfterFirstComplete: refined.delay,
          result: refined.result,
          nearest: refined.result,
          nearestDelay: refined.delay,
          nearestDiff: refined.diff
        };
      }

      let lowDelay = bracket.lowDelay;
      let highDelay = bracket.highDelay;
      let lowDiff = bracket.lowDiff;
      let bestResult = null;
      let bestDelay = lowDelay;

      for (let index = 0; index < 42; index += 1) {
        const midDelay = (lowDelay + highDelay) / 2;
        const midResult = spacingAtDelay(midDelay);
        const midDiff = midResult.completionSpacing - targetSpacing;
        bestResult = midResult;
        bestDelay = midDelay;

        if (Math.abs(midDiff) <= tolerance) {
          break;
        }

        if ((lowDiff < 0 && midDiff > 0) || (lowDiff > 0 && midDiff < 0)) {
          highDelay = midDelay;
        } else {
          lowDelay = midDelay;
          lowDiff = midDiff;
        }
      }

      return {
        available: true,
        delayAfterFirstComplete: bestDelay,
        result: bestResult
      };
    }

    function refineNearestSpacingDelay(spacingAtDelay, targetSpacing, lowDelay, highDelay) {
      let low = lowDelay;
      let high = highDelay;

      for (let index = 0; index < 36; index += 1) {
        const left = low + (high - low) / 3;
        const right = high - (high - low) / 3;
        const leftResult = spacingAtDelay(left);
        const rightResult = spacingAtDelay(right);
        const leftDiff = Math.abs(leftResult.completionSpacing - targetSpacing);
        const rightDiff = Math.abs(rightResult.completionSpacing - targetSpacing);

        if (leftDiff <= rightDiff) {
          high = right;
        } else {
          low = left;
        }
      }

      const delay = (low + high) / 2;
      const result = spacingAtDelay(delay);
      return {
        delay,
        result,
        diff: result.completionSpacing - targetSpacing
      };
    }

    function getEqualSpacingSearchDuration(settings, referenceDuration) {
      const spacingTime = settings.separation / Math.max(settings.speedNmPerSec, 0.0001);
      return Math.max(30, referenceDuration * 8, spacingTime * 12);
    }

    function getTurnRadius(settings) {
      const speedFtPerSecond = settings.speedKts * KNOTS_TO_FEET_PER_SECOND;
      const radialG = Math.sqrt(Math.max(settings.turnLoadFactor * settings.turnLoadFactor - 1, 0.0001));
      const radiusFeet = (speedFtPerSecond * speedFtPerSecond) / (GRAVITY_FTPS2 * radialG);
      return Math.max(MIN_TURN_RADIUS_NM, radiusFeet / FEET_PER_NM);
    }

    function getUnassistedOptimumTriggerTime(settings) {
      const halfAngle = Math.max(settings.angleRad / 2, 0.0001);
      const spacingTime = settings.separation / Math.max(settings.speedNmPerSec, 0.0001);
      return spacingTime / Math.tan(halfAngle);
    }

    function angularDistance(a, b) {
      const diff = Math.abs(normalizeRadians(a - b));
      return Math.min(diff, (Math.PI * 2) - diff);
    }

    function isInBlindspot(observer, target, coneAngle) {
      const offset = sub(target.point, observer.point);
      if (Math.hypot(offset.x, offset.y) < 0.0001) {
        return false;
      }
      const bearing = Math.atan2(offset.y, offset.x);
      const tailBearing = observer.heading + Math.PI;
      return angularDistance(bearing, tailBearing) <= coneAngle / 2;
    }

    function a1InA2Blindspot(getStates, time, coneAngle) {
      const states = getStates(time);
      return isInBlindspot(states.a2, states.a1, coneAngle);
    }

    function findA1BlindspotEntryTime(getStates, startTime, searchDuration, coneAngle) {
      let previousTime = startTime;
      let previousInside = a1InA2Blindspot(getStates, previousTime, coneAngle);
      if (previousInside) {
        return {
          available: true,
          time: startTime
        };
      }

      const steps = clamp(Math.ceil(searchDuration / 0.05), 320, 7000);
      for (let index = 1; index <= steps; index += 1) {
        const time = startTime + (searchDuration * index) / steps;
        const inside = a1InA2Blindspot(getStates, time, coneAngle);
        if (!previousInside && inside) {
          let low = previousTime;
          let high = time;
          for (let refine = 0; refine < 36; refine += 1) {
            const mid = (low + high) / 2;
            if (a1InA2Blindspot(getStates, mid, coneAngle)) {
              high = mid;
            } else {
              low = mid;
            }
          }
          return {
            available: true,
            time: high
          };
        }
        previousTime = time;
        previousInside = inside;
      }

      return {
        available: false,
        time: startTime
      };
    }

    function computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, speed, coneAngle) {
      if (maneuverEnd <= 0) {
        return 0;
      }

      const step = clamp(maneuverEnd / 900, 0.025, 0.1);
      let total = 0;
      for (let start = 0; start < maneuverEnd; start += step) {
        const end = Math.min(maneuverEnd, start + step);
        const time = (start + end) / 2;
        const a1 = stateAt(a1Segments, time, speed);
        const a2 = stateAt(a2Segments, time, speed);
        if (isInBlindspot(a1, a2, coneAngle) || isInBlindspot(a2, a1, coneAngle)) {
          total += end - start;
        }
      }
      return total;
    }

    function isBasicFormationManeuver(type) {
      return type === "hook" || type === "cross180" || type === "check" || type === "shackle";
    }

    function needsTurnAngleControl(type) {
      return type === "double" || type === "assisted" || type === "unassisted" || type === "check";
    }

    function needsDirectionControl(type) {
      return type === "double" || type === "assisted" || type === "unassisted" || type === "hook" || type === "check";
    }

    function needsSecondTurnControl(type) {
      return type === "double" || type === "assisted" || type === "unassisted";
    }

    function finalizeRoute(settings, radius, a1Segments, a2Segments, a1Start, a2Start, maneuverEnd, extras = {}) {
      const completionA1 = stateAt(a1Segments, maneuverEnd, settings.speedNmPerSec).point;
      const completionA2 = stateAt(a2Segments, maneuverEnd, settings.speedNmPerSec).point;
      const completionSpacing = distance(completionA1, completionA2);
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        a1TriggerTime: 0,
        a2TriggerTime: 0,
        firstTurnCompleteTime: maneuverEnd,
        a1FirstTurnCompleteTime: maneuverEnd,
        a2FirstTurnStartTime: 0,
        a2FirstTurnCompleteTime: maneuverEnd,
        totalTime,
        maneuverEnd,
        completionA1,
        completionA2,
        completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing: { available: false },
        crossing: null,
        samples,
        showTriggerMarkers: false,
        notes: [],
        ...extras
      };
    }

    function buildRoute(settings) {
      if (settings.maneuverType === "hook") {
        return buildHookRoute(settings);
      }
      if (settings.maneuverType === "cross180") {
        return buildCrossRoute(settings);
      }
      if (settings.maneuverType === "check") {
        return buildCheckRoute(settings);
      }
      if (settings.maneuverType === "shackle") {
        return buildShackleRoute(settings);
      }
      if (settings.maneuverType === "unassisted") {
        return buildUnassistedRoute(settings);
      }
      if (settings.maneuverType === "assisted") {
        return buildAssistedRoute(settings);
      }
      return buildDoubleAssistedRoute(settings);
    }

    function getStartPositions(settings) {
      return {
        a1Start: { x: 0, y: settings.separation / 2 },
        a2Start: { x: 0, y: -settings.separation / 2 }
      };
    }

    function getTurnRoles(settings) {
      const { a1Start, a2Start } = getStartPositions(settings);
      const a1IsOutside = settings.sign < 0;
      return {
        a1Start,
        a2Start,
        outsideAircraft: a1IsOutside ? "a1" : "a2",
        insideAircraft: a1IsOutside ? "a2" : "a1",
        outsideStart: a1IsOutside ? a1Start : a2Start,
        insideStart: a1IsOutside ? a2Start : a1Start
      };
    }

    function mapRoleSegments(roles, outsideSegments, insideSegments) {
      return roles.outsideAircraft === "a1"
        ? { a1Segments: outsideSegments, a2Segments: insideSegments }
        : { a1Segments: insideSegments, a2Segments: outsideSegments };
    }

    function mapRoleTimes(roles, outsideTime, insideTime) {
      return roles.outsideAircraft === "a1"
        ? { a1TriggerTime: outsideTime, a2TriggerTime: insideTime }
        : { a1TriggerTime: insideTime, a2TriggerTime: outsideTime };
    }

    function mapRoleStates(roles, outsideState, insideState) {
      return roles.outsideAircraft === "a1"
        ? { a1: outsideState, a2: insideState }
        : { a1: insideState, a2: outsideState };
    }

    function buildSynchronousTurnRoute(settings, angle, a1TurnSign, a2TurnSign, extras = {}) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const { a1Start, a2Start } = getStartPositions(settings);
      const a1Turn = makeArc(0, a1Start, startHeading, a1TurnSign, angle, radius, settings.speedNmPerSec);
      const a2Turn = makeArc(0, a2Start, startHeading, a2TurnSign, angle, radius, settings.speedNmPerSec);
      const maneuverEnd = Math.max(a1Turn.endTime, a2Turn.endTime);
      return finalizeRoute(settings, radius, [a1Turn], [a2Turn], a1Start, a2Start, maneuverEnd, extras);
    }

    function buildHookRoute(settings) {
      return buildSynchronousTurnRoute(settings, Math.PI, settings.sign, settings.sign);
    }

    function buildCheckRoute(settings) {
      return buildSynchronousTurnRoute(settings, settings.angleRad, settings.sign, settings.sign);
    }

    function buildCrossRoute(settings) {
      const radius = getTurnRadius(settings);
      const notes = [];
      const crossingCos = 1 - settings.separation / (2 * radius);
      if (crossingCos >= -1 && crossingCos <= 1) {
        const crossingSweep = Math.acos(crossingCos);
        notes.push({
          point: {
            x: radius * Math.sin(crossingSweep),
            y: 0
          },
          lines: ["Wingman:", "below"],
          placement: "right",
          offsetX: 42
        });
      }
      return buildSynchronousTurnRoute(settings, Math.PI, -1, 1, { notes });
    }

    function buildShackleRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const shackleAngle = Math.PI / 4;
      const { a1Start, a2Start } = getStartPositions(settings);
      const a1In = makeArc(0, a1Start, startHeading, -1, shackleAngle, radius, settings.speedNmPerSec);
      const a2In = makeArc(0, a2Start, startHeading, 1, shackleAngle, radius, settings.speedNmPerSec);
      const arcLateralGain = 2 * radius * (1 - Math.cos(shackleAngle));
      const straightDuration = Math.max(0, (settings.separation - arcLateralGain) / (settings.speedNmPerSec * Math.sin(shackleAngle)));

      const a1Segments = [a1In];
      const a2Segments = [a2In];
      if (straightDuration > 0.0001) {
        a1Segments.push(makeLine(a1In.endTime, a1In.endPoint, a1In.endHeading, straightDuration, settings.speedNmPerSec));
        a2Segments.push(makeLine(a2In.endTime, a2In.endPoint, a2In.endHeading, straightDuration, settings.speedNmPerSec));
      }

      const a1StraightEnd = a1Segments[a1Segments.length - 1];
      const a2StraightEnd = a2Segments[a2Segments.length - 1];
      const a1Out = makeArc(a1StraightEnd.endTime, a1StraightEnd.endPoint, a1StraightEnd.endHeading, 1, shackleAngle, radius, settings.speedNmPerSec);
      const a2Out = makeArc(a2StraightEnd.endTime, a2StraightEnd.endPoint, a2StraightEnd.endHeading, -1, shackleAngle, radius, settings.speedNmPerSec);
      a1Segments.push(a1Out);
      a2Segments.push(a2Out);

      const maneuverEnd = Math.max(a1Out.endTime, a2Out.endTime);
      const crossingPoint = {
        x: a1In.endPoint.x + (straightDuration * settings.speedNmPerSec * Math.cos(shackleAngle)) / 2,
        y: 0
      };
      return finalizeRoute(settings, radius, a1Segments, a2Segments, a1Start, a2Start, maneuverEnd, {
        notes: [
          {
            point: crossingPoint,
            lines: ["Wingman:", "below"],
            placement: "below",
            offsetY: 44
          }
        ]
      });
    }

    function buildDoubleAssistedRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const roles = getTurnRoles(settings);
      const { a1Start, a2Start } = roles;
      const overturnAngle = settings.overturnRad;
      const outsideFirstAngle = settings.angleRad + overturnAngle;
      const insideFirstAngle = overturnAngle;

      const outsideFirst = makeArc(0, roles.outsideStart, startHeading, settings.sign, outsideFirstAngle, radius, settings.speedNmPerSec);
      const insideFirstStartTime = settings.firstStartMode === "outside-first" ? outsideFirst.endTime : 0;
      const insideFirstStartPoint = add(roles.insideStart, scale(forward(startHeading), settings.speedNmPerSec * insideFirstStartTime));
      const insideFirst = makeArc(insideFirstStartTime, insideFirstStartPoint, startHeading, -settings.sign, insideFirstAngle, radius, settings.speedNmPerSec);
      const outsideFirstSegments = [outsideFirst];
      const insideFirstSegments = insideFirstStartTime > 0
        ? [makeLine(0, roles.insideStart, startHeading, insideFirstStartTime, settings.speedNmPerSec), insideFirst]
        : [insideFirst];

      function stateAfterFirst(segments, firstEndTime, time) {
        const tempSegments = segments.slice();
        appendLine(tempSegments, firstEndTime, time, settings.speedNmPerSec);
        return stateAt(tempSegments, time, settings.speedNmPerSec);
      }

      function makeTriggeredRoute(outsideTriggerTime, insideTriggerTime = outsideTriggerTime) {
        const safeOutsideTriggerTime = Math.max(outsideTriggerTime, outsideFirst.endTime);
        const safeInsideTriggerTime = Math.max(insideTriggerTime, insideFirst.endTime);
        const outsideSegments = outsideFirstSegments.slice();
        appendLine(outsideSegments, outsideFirst.endTime, safeOutsideTriggerTime, settings.speedNmPerSec);
        const outsideAtTrigger = stateAt(outsideSegments, safeOutsideTriggerTime, settings.speedNmPerSec);
        const outsideSecond = makeArc(safeOutsideTriggerTime, outsideAtTrigger.point, outsideAtTrigger.heading, -settings.sign, overturnAngle, radius, settings.speedNmPerSec);
        outsideSegments.push(outsideSecond);

        const insideSegments = insideFirstSegments.slice();
        appendLine(insideSegments, insideFirst.endTime, safeInsideTriggerTime, settings.speedNmPerSec);
        const insideAtTrigger = stateAt(insideSegments, safeInsideTriggerTime, settings.speedNmPerSec);
        const insideSecond = makeArc(safeInsideTriggerTime, insideAtTrigger.point, insideAtTrigger.heading, settings.sign, settings.angleRad + overturnAngle, radius, settings.speedNmPerSec);
        insideSegments.push(insideSecond);

        const maneuverEnd = Math.max(outsideSecond.endTime, insideSecond.endTime);
        appendLine(outsideSegments, outsideSecond.endTime, maneuverEnd, settings.speedNmPerSec);
        appendLine(insideSegments, insideSecond.endTime, maneuverEnd, settings.speedNmPerSec);

        const mappedSegments = mapRoleSegments(roles, outsideSegments, insideSegments);
        const mappedTimes = mapRoleTimes(roles, safeOutsideTriggerTime, safeInsideTriggerTime);
        const completionA1 = stateAt(mappedSegments.a1Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionA2 = stateAt(mappedSegments.a2Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionSpacing = distance(completionA1, completionA2);

        return {
          ...mappedSegments,
          ...mappedTimes,
          maneuverEnd,
          completionA1,
          completionA2,
          completionSpacing,
          outsideTriggerTime: safeOutsideTriggerTime,
          insideTriggerTime: safeInsideTriggerTime,
          triggerOutside: outsideAtTrigger.point,
          triggerInside: insideAtTrigger.point
        };
      }

      const equalSpacing = solveEqualSpacingDelay(
        (delay) => makeTriggeredRoute(outsideFirst.endTime + delay, insideFirst.endTime + delay),
        settings.separation,
        getEqualSpacingSearchDuration(settings, outsideFirst.duration)
      );
      const blindspotReferenceTime = Math.max(outsideFirst.endTime, insideFirst.endTime);
      const blindspotEntry = findA1BlindspotEntryTime(
        (time) => mapRoleStates(
          roles,
          stateAfterFirst(outsideFirstSegments, outsideFirst.endTime, time),
          stateAfterFirst(insideFirstSegments, insideFirst.endTime, time)
        ),
        blindspotReferenceTime,
        getEqualSpacingSearchDuration(settings, outsideFirst.duration),
        settings.blindspotRad
      );
      let outsideTriggerTime = outsideFirst.endTime + settings.fixedWait;
      let insideTriggerTime = outsideTriggerTime;
      let crossing = null;

      if (settings.mode === "cross") {
        const crossingReferenceTime = Math.max(outsideFirst.endTime, insideFirst.endTime);
        const outsideAtCrossingReference = stateAfterFirst(outsideFirstSegments, outsideFirst.endTime, crossingReferenceTime);
        const insideAtCrossingReference = stateAfterFirst(insideFirstSegments, insideFirst.endTime, crossingReferenceTime);
        crossing = solveLineIntersection(outsideAtCrossingReference.point, outsideAtCrossingReference.heading, insideAtCrossingReference.point, insideAtCrossingReference.heading);
        if (crossing && crossing.a1Distance >= 0) {
          outsideTriggerTime = crossingReferenceTime + crossing.a1Distance / settings.speedNmPerSec;
        } else {
          outsideTriggerTime = crossingReferenceTime;
        }
        insideTriggerTime = outsideTriggerTime;
      } else if (settings.mode === "fixed") {
        outsideTriggerTime = outsideFirst.endTime + settings.fixedWait;
        insideTriggerTime = insideFirst.endTime + settings.fixedWait;
      } else if (settings.mode === "blindspot") {
        outsideTriggerTime = blindspotEntry.time;
        insideTriggerTime = blindspotEntry.time;
      } else if (settings.mode === "optimum") {
        outsideTriggerTime = outsideFirst.endTime + equalSpacing.delayAfterFirstComplete;
        insideTriggerTime = insideFirst.endTime + equalSpacing.delayAfterFirstComplete;
      }

      const selectedRoute = makeTriggeredRoute(outsideTriggerTime, insideTriggerTime);

      const a1Segments = selectedRoute.a1Segments;
      const a2Segments = selectedRoute.a2Segments;
      const maneuverEnd = selectedRoute.maneuverEnd;
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        outsideAircraft: roles.outsideAircraft,
        insideAircraft: roles.insideAircraft,
        outsideTriggerTime: selectedRoute.outsideTriggerTime,
        insideTriggerTime: selectedRoute.insideTriggerTime,
        a1TriggerTime: selectedRoute.a1TriggerTime,
        a2TriggerTime: selectedRoute.a2TriggerTime,
        firstTurnCompleteTime: outsideFirst.endTime,
        outsideFirstTurnCompleteTime: outsideFirst.endTime,
        insideFirstTurnStartTime: insideFirstStartTime,
        insideFirstTurnCompleteTime: insideFirst.endTime,
        a1FirstTurnCompleteTime: roles.outsideAircraft === "a1" ? outsideFirst.endTime : insideFirst.endTime,
        a2FirstTurnStartTime: roles.insideAircraft === "a2" ? insideFirstStartTime : 0,
        a2FirstTurnCompleteTime: roles.outsideAircraft === "a2" ? outsideFirst.endTime : insideFirst.endTime,
        totalTime,
        maneuverEnd,
        completionA1: selectedRoute.completionA1,
        completionA2: selectedRoute.completionA2,
        completionSpacing: selectedRoute.completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing,
        crossing,
        samples
      };
    }

    function buildUnassistedRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const roles = getTurnRoles(settings);
      const { a1Start, a2Start } = roles;

      const outsideFirst = makeArc(0, roles.outsideStart, startHeading, settings.sign, settings.angleRad, radius, settings.speedNmPerSec);
      const outsideFirstSegments = [outsideFirst];

      function makeTriggeredRoute(insideTriggerTime) {
        const safeInsideTriggerTime = Math.max(0, insideTriggerTime);
        const outsideSegments = outsideFirstSegments.slice();
        appendLine(outsideSegments, outsideFirst.endTime, safeInsideTriggerTime, settings.speedNmPerSec);
        const outsideAtTrigger = stateAt(outsideSegments, safeInsideTriggerTime, settings.speedNmPerSec);

        const insideSegments = [makeLine(0, roles.insideStart, startHeading, safeInsideTriggerTime, settings.speedNmPerSec)];
        const insideAtTrigger = stateAt(insideSegments, safeInsideTriggerTime, settings.speedNmPerSec);
        const insideTurn = makeArc(safeInsideTriggerTime, insideAtTrigger.point, insideAtTrigger.heading, settings.sign, settings.angleRad, radius, settings.speedNmPerSec);
        insideSegments.push(insideTurn);

        const maneuverEnd = Math.max(outsideFirst.endTime, insideTurn.endTime);
        appendLine(outsideSegments, Math.max(outsideFirst.endTime, safeInsideTriggerTime), maneuverEnd, settings.speedNmPerSec);
        appendLine(insideSegments, insideTurn.endTime, maneuverEnd, settings.speedNmPerSec);

        const mappedSegments = mapRoleSegments(roles, outsideSegments, insideSegments);
        const mappedTimes = mapRoleTimes(roles, safeInsideTriggerTime, safeInsideTriggerTime);
        const completionA1 = stateAt(mappedSegments.a1Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionA2 = stateAt(mappedSegments.a2Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionSpacing = distance(completionA1, completionA2);

        return {
          ...mappedSegments,
          ...mappedTimes,
          maneuverEnd,
          completionA1,
          completionA2,
          completionSpacing,
          outsideTriggerTime: safeInsideTriggerTime,
          insideTriggerTime: safeInsideTriggerTime,
          triggerOutside: outsideAtTrigger.point,
          triggerInside: insideAtTrigger.point
        };
      }

      const optimumTriggerTime = getUnassistedOptimumTriggerTime(settings);
      const equalSpacing = {
        available: true,
        delayAfterFirstComplete: optimumTriggerTime,
        result: makeTriggeredRoute(optimumTriggerTime)
      };
      const blindspotReferenceTime = outsideFirst.endTime;
      const blindspotEntry = findA1BlindspotEntryTime(
        (time) => {
          const outsideSegments = outsideFirstSegments.slice();
          appendLine(outsideSegments, outsideFirst.endTime, time, settings.speedNmPerSec);
          return mapRoleStates(
            roles,
            stateAt(outsideSegments, time, settings.speedNmPerSec),
            {
              point: add(roles.insideStart, scale(forward(startHeading), settings.speedNmPerSec * time)),
              heading: startHeading
            }
          );
        },
        blindspotReferenceTime,
        getEqualSpacingSearchDuration(settings, outsideFirst.duration),
        settings.blindspotRad
      );

      let insideTriggerTime = outsideFirst.endTime + settings.fixedWait;
      let crossing = null;

      if (settings.mode === "cross") {
        const insideAtOutsideFirst = stateAt([makeLine(0, roles.insideStart, startHeading, outsideFirst.endTime, settings.speedNmPerSec)], outsideFirst.endTime, settings.speedNmPerSec);
        crossing = solveLineIntersection(outsideFirst.endPoint, outsideFirst.endHeading, insideAtOutsideFirst.point, startHeading);
        if (crossing && crossing.a1Distance >= 0) {
          insideTriggerTime = outsideFirst.endTime + crossing.a1Distance / settings.speedNmPerSec;
        } else {
          insideTriggerTime = outsideFirst.endTime;
        }
      } else if (settings.mode === "fixed") {
        insideTriggerTime = outsideFirst.endTime + settings.fixedWait;
      } else if (settings.mode === "blindspot") {
        insideTriggerTime = blindspotEntry.time;
      } else if (settings.mode === "optimum") {
        insideTriggerTime = equalSpacing.delayAfterFirstComplete;
      }

      const selectedRoute = makeTriggeredRoute(insideTriggerTime);
      const a1Segments = selectedRoute.a1Segments;
      const a2Segments = selectedRoute.a2Segments;
      const maneuverEnd = selectedRoute.maneuverEnd;
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        outsideAircraft: roles.outsideAircraft,
        insideAircraft: roles.insideAircraft,
        outsideTriggerTime: selectedRoute.outsideTriggerTime,
        insideTriggerTime: selectedRoute.insideTriggerTime,
        a1TriggerTime: selectedRoute.a1TriggerTime,
        a2TriggerTime: selectedRoute.a2TriggerTime,
        firstTurnCompleteTime: outsideFirst.endTime,
        outsideFirstTurnCompleteTime: outsideFirst.endTime,
        insideFirstTurnStartTime: 0,
        insideFirstTurnCompleteTime: 0,
        a1FirstTurnCompleteTime: roles.outsideAircraft === "a1" ? outsideFirst.endTime : 0,
        a2FirstTurnStartTime: 0,
        a2FirstTurnCompleteTime: roles.outsideAircraft === "a2" ? outsideFirst.endTime : 0,
        totalTime,
        maneuverEnd,
        completionA1: selectedRoute.completionA1,
        completionA2: selectedRoute.completionA2,
        completionSpacing: selectedRoute.completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing,
        crossing,
        samples
      };
    }

    function buildAssistedRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const roles = getTurnRoles(settings);
      const { a1Start, a2Start } = roles;
      const crossingAngle = settings.overturnRad;
      const returnAngle = settings.angleRad + crossingAngle;

      const outsideFirst = makeArc(0, roles.outsideStart, startHeading, settings.sign, settings.angleRad, radius, settings.speedNmPerSec);
      const insideTurnInStartPoint = add(roles.insideStart, scale(forward(startHeading), settings.speedNmPerSec * outsideFirst.endTime));
      const insideTurnIn = makeArc(outsideFirst.endTime, insideTurnInStartPoint, startHeading, -settings.sign, crossingAngle, radius, settings.speedNmPerSec);
      const outsideFirstSegments = [outsideFirst];
      const insideTurnInSegments = [
        makeLine(0, roles.insideStart, startHeading, outsideFirst.endTime, settings.speedNmPerSec),
        insideTurnIn
      ];

      function stateAfterTurnIn(segments, firstEndTime, time) {
        const tempSegments = segments.slice();
        appendLine(tempSegments, firstEndTime, time, settings.speedNmPerSec);
        return stateAt(tempSegments, time, settings.speedNmPerSec);
      }

      function makeTriggeredRoute(returnTriggerTime) {
        const safeReturnTriggerTime = Math.max(returnTriggerTime, insideTurnIn.endTime);
        const outsideSegments = outsideFirstSegments.slice();
        appendLine(outsideSegments, outsideFirst.endTime, safeReturnTriggerTime, settings.speedNmPerSec);
        const outsideAtTrigger = stateAt(outsideSegments, safeReturnTriggerTime, settings.speedNmPerSec);

        const insideSegments = insideTurnInSegments.slice();
        appendLine(insideSegments, insideTurnIn.endTime, safeReturnTriggerTime, settings.speedNmPerSec);
        const insideAtTrigger = stateAt(insideSegments, safeReturnTriggerTime, settings.speedNmPerSec);
        const insideReturn = makeArc(safeReturnTriggerTime, insideAtTrigger.point, insideAtTrigger.heading, settings.sign, returnAngle, radius, settings.speedNmPerSec);
        insideSegments.push(insideReturn);

        const maneuverEnd = Math.max(outsideFirst.endTime, insideReturn.endTime);
        appendLine(outsideSegments, safeReturnTriggerTime, maneuverEnd, settings.speedNmPerSec);
        appendLine(insideSegments, insideReturn.endTime, maneuverEnd, settings.speedNmPerSec);

        const mappedSegments = mapRoleSegments(roles, outsideSegments, insideSegments);
        const mappedTimes = mapRoleTimes(roles, safeReturnTriggerTime, safeReturnTriggerTime);
        const completionA1 = stateAt(mappedSegments.a1Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionA2 = stateAt(mappedSegments.a2Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionSpacing = distance(completionA1, completionA2);

        return {
          ...mappedSegments,
          ...mappedTimes,
          maneuverEnd,
          completionA1,
          completionA2,
          completionSpacing,
          outsideTriggerTime: safeReturnTriggerTime,
          insideTriggerTime: safeReturnTriggerTime,
          triggerOutside: outsideAtTrigger.point,
          triggerInside: insideAtTrigger.point
        };
      }

      const equalSpacing = solveEqualSpacingDelay(
        (delay) => makeTriggeredRoute(insideTurnIn.endTime + delay),
        settings.separation,
        getEqualSpacingSearchDuration(settings, Math.max(outsideFirst.duration, insideTurnIn.duration))
      );
      const blindspotReferenceTime = Math.max(outsideFirst.endTime, insideTurnIn.endTime);
      const blindspotEntry = findA1BlindspotEntryTime(
        (time) => mapRoleStates(
          roles,
          stateAfterTurnIn(outsideFirstSegments, outsideFirst.endTime, time),
          stateAfterTurnIn(insideTurnInSegments, insideTurnIn.endTime, time)
        ),
        blindspotReferenceTime,
        getEqualSpacingSearchDuration(settings, Math.max(outsideFirst.duration, insideTurnIn.duration)),
        settings.blindspotRad
      );

      let returnTriggerTime = insideTurnIn.endTime + settings.fixedWait;
      let crossing = null;

      if (settings.mode === "cross") {
        const crossingReferenceTime = Math.max(outsideFirst.endTime, insideTurnIn.endTime);
        const outsideAtCrossingReference = stateAfterTurnIn(outsideFirstSegments, outsideFirst.endTime, crossingReferenceTime);
        const insideAtCrossingReference = stateAfterTurnIn(insideTurnInSegments, insideTurnIn.endTime, crossingReferenceTime);
        crossing = solveLineIntersection(outsideAtCrossingReference.point, outsideAtCrossingReference.heading, insideAtCrossingReference.point, insideAtCrossingReference.heading);
        if (crossing && crossing.a1Distance >= 0) {
          returnTriggerTime = crossingReferenceTime + crossing.a1Distance / settings.speedNmPerSec;
        } else {
          returnTriggerTime = crossingReferenceTime;
        }
      } else if (settings.mode === "fixed") {
        returnTriggerTime = insideTurnIn.endTime + settings.fixedWait;
      } else if (settings.mode === "blindspot") {
        returnTriggerTime = blindspotEntry.time;
      } else if (settings.mode === "optimum") {
        returnTriggerTime = insideTurnIn.endTime + equalSpacing.delayAfterFirstComplete;
      }

      const selectedRoute = makeTriggeredRoute(returnTriggerTime);
      const a1Segments = selectedRoute.a1Segments;
      const a2Segments = selectedRoute.a2Segments;
      const maneuverEnd = selectedRoute.maneuverEnd;
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        outsideAircraft: roles.outsideAircraft,
        insideAircraft: roles.insideAircraft,
        outsideTriggerTime: selectedRoute.outsideTriggerTime,
        insideTriggerTime: selectedRoute.insideTriggerTime,
        a1TriggerTime: selectedRoute.a1TriggerTime,
        a2TriggerTime: selectedRoute.a2TriggerTime,
        firstTurnCompleteTime: outsideFirst.endTime,
        outsideFirstTurnCompleteTime: outsideFirst.endTime,
        insideFirstTurnStartTime: insideTurnIn.startTime,
        insideFirstTurnCompleteTime: insideTurnIn.endTime,
        a1FirstTurnCompleteTime: roles.outsideAircraft === "a1" ? outsideFirst.endTime : insideTurnIn.endTime,
        a2FirstTurnStartTime: roles.insideAircraft === "a2" ? insideTurnIn.startTime : 0,
        a2FirstTurnCompleteTime: roles.outsideAircraft === "a2" ? outsideFirst.endTime : insideTurnIn.endTime,
        totalTime,
        maneuverEnd,
        completionA1: selectedRoute.completionA1,
        completionA2: selectedRoute.completionA2,
        completionSpacing: selectedRoute.completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing,
        crossing,
        samples
      };
    }

    function sampleSegments(segments, totalTime, speed) {
      const step = clamp(totalTime / 700, 0.035, 0.16);
      const points = [];
      for (let time = 0; time < totalTime; time += step) {
        const state = stateAt(segments, time, speed);
        points.push({ time, x: state.point.x, y: state.point.y });
      }
      const finalState = stateAt(segments, totalTime, speed);
      points.push({ time: totalTime, x: finalState.point.x, y: finalState.point.y });
      return points;
    }

    function resizeCanvas() {
      const rect = elements.stage.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      viewport = {
        width: Math.max(1, rect.width),
        height: Math.max(1, rect.height),
        dpr
      };
      elements.canvas.width = Math.round(viewport.width * dpr);
      elements.canvas.height = Math.round(viewport.height * dpr);
      elements.canvas.style.width = `${viewport.width}px`;
      elements.canvas.style.height = `${viewport.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function makeTransform() {
      const all = route.samples.a1.concat(route.samples.a2, [
        { x: route.a1Start.x, y: route.a1Start.y },
        { x: route.a2Start.x, y: route.a2Start.y }
      ]);
      let minX = Math.min(...all.map((point) => point.x));
      let maxX = Math.max(...all.map((point) => point.x));
      let minY = Math.min(...all.map((point) => point.y));
      let maxY = Math.max(...all.map((point) => point.y));
      const margin = Math.max(0.35, params.separation * 0.4, route.radius * 0.3);
      minX -= margin;
      maxX += margin;
      minY -= margin;
      maxY += margin;

      const worldWidth = Math.max(0.1, maxX - minX);
      const worldHeight = Math.max(0.1, maxY - minY);
      const canvasAspect = viewport.width / viewport.height;
      const worldAspect = worldWidth / worldHeight;

      if (worldAspect < canvasAspect) {
        const expandedWidth = worldHeight * canvasAspect;
        const extra = (expandedWidth - worldWidth) / 2;
        minX -= extra;
        maxX += extra;
      } else {
        const expandedHeight = worldWidth / canvasAspect;
        const extra = (expandedHeight - worldHeight) / 2;
        minY -= extra;
        maxY += extra;
      }

      const scaleFactor = viewport.width / (maxX - minX);
      return {
        minX,
        maxX,
        minY,
        maxY,
        scale: scaleFactor,
        toScreen(point) {
          return {
            x: (point.x - minX) * scaleFactor,
            y: (maxY - point.y) * scaleFactor
          };
        }
      };
    }

    function draw() {
      if (!route || viewport.width <= 1) {
        return;
      }

      ctx.clearRect(0, 0, viewport.width, viewport.height);
      const transform = makeTransform();
      drawGrid(transform);
      drawInitialSeparation(transform);
      if (params.showBlindspots) {
        drawBlindspots(transform);
      }
      drawAircraftPath(route.samples.a1, elapsed, "var(--a1)", "rgba(217, 95, 67, 0.28)", transform);
      drawAircraftPath(route.samples.a2, elapsed, "var(--a2)", "rgba(31, 122, 140, 0.28)", transform);
      drawTriggerMarkers(transform);
      drawCompletionSpacing(transform);
      drawRouteNotes(transform);

      const a1 = stateAt(route.a1Segments, elapsed, params.speedNmPerSec);
      const a2 = stateAt(route.a2Segments, elapsed, params.speedNmPerSec);
      drawAircraft(a1.point, a1.heading, "#d95f43", "A1", transform);
      drawAircraft(a2.point, a2.heading, "#1f7a8c", "A2", transform);
    }

    function drawBlindspots(transform) {
      const range = Math.max(0.8, params.separation * 1.35, route.radius * 1.7);
      const a1 = stateAt(route.a1Segments, elapsed, params.speedNmPerSec);
      const a2 = stateAt(route.a2Segments, elapsed, params.speedNmPerSec);
      drawBlindspotCone(a1.point, a1.heading, range, "rgba(217, 95, 67, 0.14)", "rgba(217, 95, 67, 0.28)", transform);
      drawBlindspotCone(a2.point, a2.heading, range, "rgba(31, 122, 140, 0.14)", "rgba(31, 122, 140, 0.28)", transform);
    }

    function drawBlindspotCone(point, heading, range, fillColor, strokeColor, transform) {
      const center = transform.toScreen(point);
      const tailHeading = heading + Math.PI;
      const halfCone = params.blindspotRad / 2;
      const steps = 12;

      ctx.save();
      ctx.fillStyle = fillColor;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(center.x, center.y);
      for (let index = 0; index <= steps; index += 1) {
        const amount = index / steps;
        const coneHeading = tailHeading - halfCone + params.blindspotRad * amount;
        const edge = transform.toScreen(add(point, scale(forward(coneHeading), range)));
        ctx.lineTo(edge.x, edge.y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function cssColor(value) {
      if (!value.startsWith("var(")) {
        return value;
      }
      const name = value.slice(4, -1).trim();
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawGrid(transform) {
      const gridStep = chooseGridStep((transform.maxX - transform.minX) / 8);
      ctx.save();
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#e2e8e5";
      ctx.fillStyle = "#7d8782";
      ctx.font = "12px Inter, system-ui, sans-serif";
      ctx.textBaseline = "middle";

      const startX = Math.floor(transform.minX / gridStep) * gridStep;
      for (let x = startX; x <= transform.maxX; x += gridStep) {
        const a = transform.toScreen({ x, y: transform.minY });
        const b = transform.toScreen({ x, y: transform.maxY });
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      const startY = Math.floor(transform.minY / gridStep) * gridStep;
      for (let y = startY; y <= transform.maxY; y += gridStep) {
        const a = transform.toScreen({ x: transform.minX, y });
        const b = transform.toScreen({ x: transform.maxX, y });
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      drawScaleBar(transform, gridStep);
      ctx.restore();
    }

    function chooseGridStep(raw) {
      const steps = [0.25, 0.5, 1, 2, 5, 10];
      return steps.find((step) => step >= raw) || 10;
    }

    function drawScaleBar(transform, gridStep) {
      const length = gridStep;
      const start = transform.toScreen({
        x: transform.minX + (transform.maxX - transform.minX) * 0.06,
        y: transform.minY + (transform.maxY - transform.minY) * 0.08
      });
      const end = {
        x: start.x + length * transform.scale,
        y: start.y
      };
      ctx.strokeStyle = "#6d7773";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.moveTo(start.x, start.y - 5);
      ctx.lineTo(start.x, start.y + 5);
      ctx.moveTo(end.x, end.y - 5);
      ctx.lineTo(end.x, end.y + 5);
      ctx.stroke();
      ctx.fillStyle = "#596460";
      ctx.textAlign = "center";
      const label = Number.isInteger(length) ? `${length} NM` : `${length.toFixed(2)} NM`;
      ctx.fillText(label, (start.x + end.x) / 2, start.y - 16);
    }

    function drawInitialSeparation(transform) {
      const xOffset = -Math.max(0.18, params.separation * 0.14);
      const p1 = transform.toScreen({ x: xOffset, y: route.a1Start.y });
      const p2 = transform.toScreen({ x: xOffset, y: route.a2Start.y });
      ctx.save();
      ctx.strokeStyle = "#48524e";
      ctx.fillStyle = "#48524e";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(p1.x - 8, p1.y);
      ctx.lineTo(p1.x + 8, p1.y);
      ctx.moveTo(p2.x - 8, p2.y);
      ctx.lineTo(p2.x + 8, p2.y);
      ctx.stroke();
      ctx.font = "700 12px Inter, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(formatNm(params.separation), p1.x + 12, (p1.y + p2.y) / 2);
      ctx.restore();
    }

    function drawTriggerMarkers(transform) {
      if (route.showTriggerMarkers === false) {
        return;
      }
      const markers = getTriggerSnapshots();
      const drawnTimes = [];

      markers.forEach((item) => {
        const duplicateLine = drawnTimes.some((time) => Math.abs(time - item.time) < 0.05);
        drawTriggerSnapshot(item, transform, duplicateLine);
        drawnTimes.push(item.time);
      });
    }

    function getTriggerSnapshots() {
      if (route.showTriggerMarkers === false) {
        return [];
      }
      const outsideAircraft = route.outsideAircraft || "a1";
      const insideAircraft = route.insideAircraft || "a2";
      const outsideTriggerTime = typeof route.outsideTriggerTime === "number" ? route.outsideTriggerTime : route.a1TriggerTime;
      const insideTriggerTime = typeof route.insideTriggerTime === "number" ? route.insideTriggerTime : route.a2TriggerTime;
      const insideFirstCue = getInsideFirstTurnCueSnapshot();
      const insideTurnMarker = makeTriggerMarker(insideAircraft, insideTriggerTime);

      if (params.maneuverType === "assisted" || params.maneuverType === "unassisted") {
        return params.maneuverType === "assisted" && insideFirstCue
          ? [insideFirstCue, insideTurnMarker]
          : [insideTurnMarker];
      }
      const markers = [
        makeTriggerMarker(outsideAircraft, outsideTriggerTime),
        insideTurnMarker
      ];
      if (insideFirstCue && params.firstStartMode === "outside-first") {
        markers.unshift(insideFirstCue);
      }
      return markers;
    }

    function getAircraftSegments(aircraft) {
      return aircraft === "a1" ? route.a1Segments : route.a2Segments;
    }

    function getOtherAircraft(aircraft) {
      return aircraft === "a1" ? "a2" : "a1";
    }

    function getAircraftColor(aircraft) {
      return aircraft === "a1" ? "#d95f43" : "#2e6f58";
    }

    function getAircraftStateAt(aircraft, time) {
      return stateAt(getAircraftSegments(aircraft), time, params.speedNmPerSec);
    }

    function makeTriggerMarker(aircraft, time) {
      const otherAircraft = getOtherAircraft(aircraft);
      return {
        id: aircraft,
        trigger: getAircraftStateAt(aircraft, time),
        ghost: getAircraftStateAt(otherAircraft, time),
        triggerLabel: "",
        ghostLabel: "",
        ghostColor: getAircraftColor(otherAircraft),
        time
      };
    }

    function getInsideFirstTurnCueSnapshot() {
      const insideFirstTurnStartTime = typeof route.insideFirstTurnStartTime === "number"
        ? route.insideFirstTurnStartTime
        : route.a2FirstTurnStartTime;
      if (typeof insideFirstTurnStartTime !== "number" || insideFirstTurnStartTime <= 0.0001) {
        return null;
      }
      const insideAircraft = route.insideAircraft || "a2";
      const outsideAircraft = route.outsideAircraft || "a1";
      return {
        id: `${insideAircraft}-first`,
        trigger: getAircraftStateAt(insideAircraft, insideFirstTurnStartTime),
        ghost: getAircraftStateAt(outsideAircraft, insideFirstTurnStartTime),
        triggerLabel: "",
        ghostLabel: "",
        ghostColor: getAircraftColor(outsideAircraft),
        cueText: `Cue: ${outsideAircraft.toUpperCase()} levels wings`,
        time: insideFirstTurnStartTime
      };
    }

    function drawTriggerSnapshot(item, transform, duplicateLine) {
      const triggerPoint = transform.toScreen(item.trigger.point);
