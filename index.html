<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Double Assisted Tactical Turn</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #18211f;
      --muted: #596460;
      --line: #d8dfdc;
      --soft: #edf1ef;
      --a1: #d95f43;
      --a1-soft: rgba(217, 95, 67, 0.32);
      --a2: #1f7a8c;
      --a2-soft: rgba(31, 122, 140, 0.32);
      --focus: #2e6f58;
      --shadow: 0 18px 45px rgba(35, 47, 44, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1440px, 100%);
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 16px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 12px 20px;
    }

    .headline {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .title-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .title-row h1 {
      min-width: 0;
    }

    .info-button {
      display: grid;
      place-items: center;
      flex: none;
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--panel);
      color: var(--focus);
      font-size: 0.88rem;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(35, 47, 44, 0.08);
    }

    .info-button:hover,
    .info-button:focus-visible {
      border-color: var(--focus);
      outline: none;
    }

    .info-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 30;
      width: min(430px, calc(100vw - 40px));
      max-height: min(58vh, 420px);
      overflow: auto;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--ink);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .info-popover p {
      margin: 0 0 12px;
    }

    .info-item {
      margin-top: 7px;
      font-weight: 800;
    }

    .info-pro {
      color: #2e6f58;
    }

    .info-con {
      color: #b42318;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      white-space: nowrap;
    }

    .segmented.tabs {
      width: 100%;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      overflow: hidden;
    }

    .segmented.tabs label {
      grid-column: span 2;
      min-width: 0;
    }

    .segmented.tabs span {
      white-space: nowrap;
    }

    .maneuver-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }

    .time-card {
      min-width: 172px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(35, 47, 44, 0.08);
      text-align: right;
    }

    .time-card span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .time-card strong {
      display: block;
      margin-top: 2px;
      font-size: 1.65rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(250px, 310px) 1fr;
      gap: 16px;
      overflow: hidden;
    }

    .controls {
      min-width: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      align-self: stretch;
      overflow: auto;
    }

    .control-group {
      padding: 14px 0;
      border-bottom: 1px solid var(--soft);
    }

    .control-group:first-child {
      padding-top: 0;
    }

    .control-group:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .control-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
    }

    output {
      color: var(--muted);
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--focus);
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented span {
      display: grid;
      place-items: center;
      min-height: 34px;
      padding: 6px 8px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .segmented input:checked + span {
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(35, 47, 44, 0.1);
    }

    .mode {
      grid-template-columns: 1fr;
    }

    .mode span {
      justify-content: start;
      place-items: center start;
      padding-left: 12px;
    }

    .disabled {
      opacity: 0.45;
    }

    [hidden] {
      display: none !important;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--focus);
      flex: 0 0 auto;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fbfcfb;
      box-shadow: var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      left: 14px;
      top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(216, 223, 220, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }

    .swatch {
      width: 22px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }

    .legend-item:first-child {
      color: var(--a1);
    }

    .legend-item:nth-child(2) {
      color: var(--a2);
    }

    .diagram-options {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      justify-content: flex-end;
    }

    .diagram-range {
      width: 180px;
      padding: 8px 10px 9px;
      border: 1px solid rgba(216, 223, 220, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    .diagram-range-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .diagram-range input {
      display: block;
      width: 100%;
      accent-color: var(--focus);
    }

    .diagram-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid rgba(216, 223, 220, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 800;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
    }

    .diagram-toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--focus);
    }

    .scrubber {
      display: grid;
      grid-template-columns: 44px 1fr minmax(142px, auto);
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(35, 47, 44, 0.1);
    }

    .icon-button {
      width: 44px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .icon-button:focus-visible,
    .segmented span:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(46, 111, 88, 0.28);
      outline-offset: 2px;
    }

    .play-symbol,
    .pause-symbol {
      display: block;
      width: 18px;
      height: 18px;
      position: relative;
    }

    .play-symbol::before {
      content: "";
      position: absolute;
      inset: 2px 1px 2px 4px;
      border-left: 13px solid var(--ink);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .pause-symbol::before,
    .pause-symbol::after {
      content: "";
      position: absolute;
      top: 2px;
      bottom: 2px;
      width: 5px;
      background: var(--ink);
      border-radius: 2px;
    }

    .pause-symbol::before {
      left: 3px;
    }

    .pause-symbol::after {
      right: 3px;
    }

    .time-readout {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .app {
        padding: 14px;
      }

      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .time-card {
        width: 100%;
        text-align: left;
      }

      .workspace {
        display: grid;
        grid-template-rows: minmax(260px, 1fr) minmax(150px, auto);
      }

      .controls {
        order: 2;
        max-height: 34vh;
      }

      .stage {
        min-height: 0;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .tabs span {
        min-height: 32px;
        padding: 5px 6px;
        font-size: 0.8rem;
      }

      .stage {
        min-height: 0;
      }

      .scrubber {
        grid-template-columns: 42px 1fr;
      }

      .time-readout {
        grid-column: 1 / -1;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="maneuver-nav" aria-label="Maneuver type">
      <div class="segmented tabs" role="tablist">
        <label>
          <input type="radio" name="maneuver" value="double" checked>
          <span tabindex="0">Double assisted</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="assisted">
          <span tabindex="0">Assisted</span>
        </label>
        <label>
          <input type="radio" name="maneuver" value="unassisted">
          <span tabindex="0">Unassisted</span>
        </label>
      </div>
    </nav>

    <header class="topbar">
      <div class="headline">
        <div class="title-row">
          <h1 id="pageTitle">Double Assisted Tactical Turn</h1>
          <button class="info-button" type="button" id="infoToggle" aria-label="Show maneuver information" aria-expanded="false" aria-controls="maneuverInfo" title="Maneuver information">i</button>
          <div class="info-popover" id="maneuverInfo" role="tooltip" hidden></div>
        </div>
        <div class="meta" aria-live="polite">
          <span class="pill" id="turnTimeSummary">Turn time 0.0 s</span>
          <span class="pill" id="blindspotTimeSummary">Time in blindspot 0.0 s</span>
          <span class="pill" id="radiusSummary">Radius 0.0 NM</span>
          <span class="pill" id="completionSpacingSummary">Spacing 0.0 NM</span>
        </div>
      </div>
      <div class="time-card" aria-live="polite">
        <span>Elapsed</span>
        <strong id="elapsedLarge">0.0 s</strong>
      </div>
    </header>

    <section class="workspace">
      <aside class="controls" aria-label="Maneuver controls">
        <div class="control-group">
          <div class="control-heading">
            <label for="turnAngle">Turn angle</label>
            <output id="turnAngleValue" for="turnAngle">45 deg</output>
          </div>
          <input id="turnAngle" type="range" min="20" max="70" step="1" value="45">
        </div>

        <div class="control-group">
          <div class="control-heading">Direction</div>
          <div class="segmented" role="radiogroup" aria-label="Turn direction">
            <label>
              <input type="radio" name="direction" value="left" checked>
              <span tabindex="0">Left</span>
            </label>
            <label>
              <input type="radio" name="direction" value="right">
              <span tabindex="0">Right</span>
            </label>
          </div>
        </div>

        <div class="control-group" id="firstTurnGroup">
          <div class="control-heading">First turn</div>
          <div class="segmented mode" role="radiogroup" aria-label="First turn timing">
            <label>
              <input type="radio" name="firstStart" value="simultaneous" checked>
              <span tabindex="0">Simultaneous</span>
            </label>
            <label>
              <input type="radio" name="firstStart" value="outside-first">
              <span tabindex="0" title="Inside aircraft's first turn begins after outside aircraft completes first turn (wings level)">Outside first</span>
            </label>
          </div>
        </div>

        <div class="control-group" id="overturnGroup">
          <div class="control-heading">
            <label for="overturn">Overturn</label>
            <output id="overturnValue" for="overturn">20 deg</output>
          </div>
          <input id="overturn" type="range" min="0" max="45" step="1" value="20">
          <label class="toggle-row" for="overturnHalfAngle">
            <span>Lock to 50% of turn angle</span>
            <input id="overturnHalfAngle" type="checkbox">
          </label>
        </div>

        <div class="control-group">
          <div class="control-heading">
            <label for="separation">Separation</label>
            <output id="separationValue" for="separation">1.0 NM</output>
          </div>
          <input id="separation" type="range" min="0.5" max="5" step="0.1" value="1">
        </div>

        <div class="control-group">
          <div class="control-heading">
            <label for="speed">Contract speed</label>
            <output id="speedValue" for="speed">420 kt</output>
          </div>
          <input id="speed" type="range" min="180" max="600" step="10" value="420">
        </div>

        <div class="control-group">
          <div class="control-heading" id="secondTurnHeading">Second turn</div>
          <div class="segmented mode" role="radiogroup" aria-label="Second turn trigger">
            <label>
              <input type="radio" name="mode" value="optimum" checked>
              <span tabindex="0">Optimum</span>
            </label>
            <label>
              <input type="radio" name="mode" value="cross">
              <span tabindex="0">At crossing</span>
            </label>
            <label>
              <input type="radio" name="mode" value="fixed">
              <span tabindex="0">Fixed wait</span>
            </label>
          </div>
        </div>

        <div class="control-group" id="fixedWaitGroup">
          <div class="control-heading">
            <label for="fixedWait" id="fixedWaitLabel">Wait after first turn completed</label>
            <output id="fixedWaitValue" for="fixedWait">3.0 s</output>
          </div>
          <input id="fixedWait" type="range" min="0" max="20" step="0.5" value="3">
        </div>

      </aside>

      <div class="stage" id="stage">
        <canvas id="plot" aria-label="Animated tactical turn plot"></canvas>
        <div class="diagram-options">
          <div class="diagram-range">
            <div class="diagram-range-heading">
              <label for="blindspotSize">Blindspot</label>
              <output id="blindspotSizeValue" for="blindspotSize">30 deg</output>
            </div>
            <input id="blindspotSize" type="range" min="15" max="180" step="5" value="30">
          </div>
          <label class="diagram-toggle" for="showBlindspots">
            <input id="showBlindspots" type="checkbox">
            <span>Show blindspots</span>
          </label>
        </div>
        <div class="legend" aria-hidden="true">
          <span class="legend-item"><span class="swatch"></span>A1 outside</span>
          <span class="legend-item"><span class="swatch"></span>A2 inside</span>
        </div>
      </div>
    </section>

    <footer class="scrubber">
      <button class="icon-button" type="button" id="playPause" aria-label="Play" title="Play">
        <span class="play-symbol" aria-hidden="true"></span>
      </button>
      <input id="timeSlider" type="range" min="0" max="1" step="0.1" value="0" aria-label="Elapsed time in seconds">
      <output class="time-readout" id="timeReadout" for="timeSlider">0.0 / 0.0 s</output>
    </footer>
  </main>

  <script>
    const BASE_TURN_SPEED_KTS = 420;
    const BASE_TURN_RADIUS_NM = 0.7;
    const MIN_TURN_RADIUS_NM = 0.08;
    const FINAL_LEAD_SECONDS = 8;

    const elements = {
      stage: document.getElementById("stage"),
      canvas: document.getElementById("plot"),
      pageTitle: document.getElementById("pageTitle"),
      infoToggle: document.getElementById("infoToggle"),
      maneuverInfo: document.getElementById("maneuverInfo"),
      turnAngle: document.getElementById("turnAngle"),
      turnAngleValue: document.getElementById("turnAngleValue"),
      firstTurnGroup: document.getElementById("firstTurnGroup"),
      overturnGroup: document.getElementById("overturnGroup"),
      overturn: document.getElementById("overturn"),
      overturnValue: document.getElementById("overturnValue"),
      overturnHalfAngle: document.getElementById("overturnHalfAngle"),
      separation: document.getElementById("separation"),
      separationValue: document.getElementById("separationValue"),
      speed: document.getElementById("speed"),
      speedValue: document.getElementById("speedValue"),
      secondTurnHeading: document.getElementById("secondTurnHeading"),
      fixedWait: document.getElementById("fixedWait"),
      fixedWaitLabel: document.getElementById("fixedWaitLabel"),
      fixedWaitValue: document.getElementById("fixedWaitValue"),
      fixedWaitGroup: document.getElementById("fixedWaitGroup"),
      timeSlider: document.getElementById("timeSlider"),
      timeReadout: document.getElementById("timeReadout"),
      blindspotSize: document.getElementById("blindspotSize"),
      blindspotSizeValue: document.getElementById("blindspotSizeValue"),
      showBlindspots: document.getElementById("showBlindspots"),
      elapsedLarge: document.getElementById("elapsedLarge"),
      turnTimeSummary: document.getElementById("turnTimeSummary"),
      blindspotTimeSummary: document.getElementById("blindspotTimeSummary"),
      radiusSummary: document.getElementById("radiusSummary"),
      completionSpacingSummary: document.getElementById("completionSpacingSummary"),
      playPause: document.getElementById("playPause")
    };

    const ctx = elements.canvas.getContext("2d");
    let params = readParams();
    let route = buildRoute(params);
    let elapsed = 0;
    let activeTrigger = null;
    let playing = false;
    let lastFrameTime = 0;
    let viewport = { width: 1, height: 1, dpr: 1 };

    function radians(deg) {
      return (deg * Math.PI) / 180;
    }

    function degrees(rad) {
      return (rad * 180) / Math.PI;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function add(a, b) {
      return { x: a.x + b.x, y: a.y + b.y };
    }

    function sub(a, b) {
      return { x: a.x - b.x, y: a.y - b.y };
    }

    function scale(v, amount) {
      return { x: v.x * amount, y: v.y * amount };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function forward(heading) {
      return { x: Math.cos(heading), y: Math.sin(heading) };
    }

    function leftNormal(heading) {
      return { x: -Math.sin(heading), y: Math.cos(heading) };
    }

    function formatSeconds(value) {
      return `${value.toFixed(1)} s`;
    }

    function formatNm(value) {
      return `${value.toFixed(1)} NM`;
    }

    function formatDegrees(value) {
      return `${Number.isInteger(value) ? value.toFixed(0) : value.toFixed(1)} deg`;
    }

    function normalizeRadians(value) {
      const fullTurn = Math.PI * 2;
      return ((value % fullTurn) + fullTurn) % fullTurn;
    }

    function readParams() {
      const maneuverInput = document.querySelector("input[name='maneuver']:checked");
      const maneuverType = maneuverInput ? maneuverInput.value : "double";
      const directionInput = document.querySelector("input[name='direction']:checked");
      const firstStartInput = document.querySelector("input[name='firstStart']:checked");
      const modeInput = document.querySelector("input[name='mode']:checked");
      const angleMax = maneuverType === "unassisted" ? 90 : 70;
      elements.turnAngle.max = String(angleMax);
      let angleDeg = Number(elements.turnAngle.value);
      if (angleDeg > angleMax) {
        angleDeg = angleMax;
        elements.turnAngle.value = String(angleMax);
      }
      const lockOverturnToHalf = elements.overturnHalfAngle.checked;
      const overturnDeg = lockOverturnToHalf ? angleDeg / 2 : Number(elements.overturn.value);
      const blindspotDeg = Number(elements.blindspotSize.value);
      return {
        maneuverType,
        angleDeg,
        angleRad: radians(angleDeg),
        overturnDeg,
        overturnRad: radians(overturnDeg),
        lockOverturnToHalf,
        direction: directionInput ? directionInput.value : "left",
        sign: directionInput && directionInput.value === "right" ? -1 : 1,
        separation: Number(elements.separation.value),
        speedKts: Number(elements.speed.value),
        speedNmPerSec: Number(elements.speed.value) / 3600,
        firstStartMode: firstStartInput ? firstStartInput.value : "simultaneous",
        mode: modeInput ? modeInput.value : "cross",
        fixedWait: Number(elements.fixedWait.value),
        blindspotDeg,
        blindspotRad: radians(blindspotDeg),
        showBlindspots: elements.showBlindspots.checked
      };
    }

    function makeArc(startTime, startPoint, startHeading, turnSign, angle, radius, speed) {
      const duration = (radius * angle) / speed;
      const center = add(startPoint, scale(leftNormal(startHeading), turnSign * radius));
      const endHeading = startHeading + turnSign * angle;
      const endPoint = sub(center, scale(leftNormal(endHeading), turnSign * radius));
      return {
        type: "arc",
        startTime,
        endTime: startTime + duration,
        duration,
        startPoint,
        startHeading,
        turnSign,
        angle,
        radius,
        center,
        endPoint,
        endHeading
      };
    }

    function makeLine(startTime, startPoint, heading, duration, speed) {
      const safeDuration = Math.max(0, duration);
      const endPoint = add(startPoint, scale(forward(heading), speed * safeDuration));
      return {
        type: "line",
        startTime,
        endTime: startTime + safeDuration,
        duration: safeDuration,
        startPoint,
        heading,
        endPoint,
        endHeading: heading
      };
    }

    function stateOnSegment(segment, time, speed) {
      const local = clamp(time - segment.startTime, 0, segment.duration);
      if (segment.type === "line") {
        return {
          point: add(segment.startPoint, scale(forward(segment.heading), speed * local)),
          heading: segment.heading
        };
      }

      const swept = segment.radius > 0 ? (speed * local) / segment.radius : 0;
      const heading = segment.startHeading + segment.turnSign * swept;
      return {
        point: sub(segment.center, scale(leftNormal(heading), segment.turnSign * segment.radius)),
        heading
      };
    }

    function stateAt(segments, time, speed) {
      const segment = segments.find((item) => time <= item.endTime + 0.0001) || segments[segments.length - 1];
      return stateOnSegment(segment, time, speed);
    }

    function appendLine(segments, startTime, endTime, speed) {
      const last = segments[segments.length - 1];
      if (endTime <= startTime + 0.0001) {
        return;
      }
      segments.push(makeLine(startTime, last.endPoint, last.endHeading, endTime - startTime, speed));
    }

    function solveLineIntersection(p1, h1, p2, h2) {
      const v1 = forward(h1);
      const v2 = forward(h2);
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const det = (v2.x * v1.y) - (v1.x * v2.y);
      if (Math.abs(det) < 0.000001) {
        return null;
      }
      const s1 = ((v2.x * dy) - (v2.y * dx)) / det;
      const s2 = ((v1.x * dy) - (v1.y * dx)) / det;
      return {
        a1Distance: s1,
        a2Distance: s2,
        point: add(p1, scale(v1, s1))
      };
    }

    function solveEqualSpacingDelay(spacingAtDelay, targetSpacing, searchDuration) {
      const tolerance = 0.001;
      let previousDelay = 0;
      let previousResult = spacingAtDelay(previousDelay);
      let previousDiff = previousResult.completionSpacing - targetSpacing;
      let nearestDelay = previousDelay;
      let nearestResult = previousResult;
      let nearestDiff = previousDiff;

      if (Math.abs(previousDiff) <= tolerance) {
        return {
          available: true,
          delayAfterFirstComplete: previousDelay,
          result: previousResult
        };
      }

      let bracket = null;
      const steps = clamp(Math.ceil(searchDuration / 0.25), 260, 5000);
      const scanStep = searchDuration / steps;
      for (let index = 1; index <= steps; index += 1) {
        const delay = (searchDuration * index) / steps;
        const result = spacingAtDelay(delay);
        const diff = result.completionSpacing - targetSpacing;

        if (Math.abs(diff) < Math.abs(nearestDiff)) {
          nearestDelay = delay;
          nearestResult = result;
          nearestDiff = diff;
        }

        if (Math.abs(diff) <= tolerance) {
          return {
            available: true,
            delayAfterFirstComplete: delay,
            result
          };
        }

        if ((previousDiff < 0 && diff > 0) || (previousDiff > 0 && diff < 0)) {
          bracket = {
            lowDelay: previousDelay,
            highDelay: delay,
            lowDiff: previousDiff,
            highDiff: diff
          };
          break;
        }

        previousDelay = delay;
        previousResult = result;
        previousDiff = diff;
      }

      if (!bracket) {
        const refined = refineNearestSpacingDelay(
          spacingAtDelay,
          targetSpacing,
          Math.max(0, nearestDelay - scanStep),
          Math.min(searchDuration, nearestDelay + scanStep)
        );
        if (Math.abs(refined.diff) <= tolerance) {
          return {
            available: true,
            delayAfterFirstComplete: refined.delay,
            result: refined.result
          };
        }
        return {
          available: false,
          delayAfterFirstComplete: refined.delay,
          result: refined.result,
          nearest: refined.result,
          nearestDelay: refined.delay,
          nearestDiff: refined.diff
        };
      }

      let lowDelay = bracket.lowDelay;
      let highDelay = bracket.highDelay;
      let lowDiff = bracket.lowDiff;
      let bestResult = null;
      let bestDelay = lowDelay;

      for (let index = 0; index < 42; index += 1) {
        const midDelay = (lowDelay + highDelay) / 2;
        const midResult = spacingAtDelay(midDelay);
        const midDiff = midResult.completionSpacing - targetSpacing;
        bestResult = midResult;
        bestDelay = midDelay;

        if (Math.abs(midDiff) <= tolerance) {
          break;
        }

        if ((lowDiff < 0 && midDiff > 0) || (lowDiff > 0 && midDiff < 0)) {
          highDelay = midDelay;
        } else {
          lowDelay = midDelay;
          lowDiff = midDiff;
        }
      }

      return {
        available: true,
        delayAfterFirstComplete: bestDelay,
        result: bestResult
      };
    }

    function refineNearestSpacingDelay(spacingAtDelay, targetSpacing, lowDelay, highDelay) {
      let low = lowDelay;
      let high = highDelay;

      for (let index = 0; index < 36; index += 1) {
        const left = low + (high - low) / 3;
        const right = high - (high - low) / 3;
        const leftResult = spacingAtDelay(left);
        const rightResult = spacingAtDelay(right);
        const leftDiff = Math.abs(leftResult.completionSpacing - targetSpacing);
        const rightDiff = Math.abs(rightResult.completionSpacing - targetSpacing);

        if (leftDiff <= rightDiff) {
          high = right;
        } else {
          low = left;
        }
      }

      const delay = (low + high) / 2;
      const result = spacingAtDelay(delay);
      return {
        delay,
        result,
        diff: result.completionSpacing - targetSpacing
      };
    }

    function getEqualSpacingSearchDuration(settings, referenceDuration) {
      const spacingTime = settings.separation / Math.max(settings.speedNmPerSec, 0.0001);
      return Math.max(30, referenceDuration * 8, spacingTime * 12);
    }

    function getTurnRadius(settings) {
      const speedRatio = settings.speedKts / BASE_TURN_SPEED_KTS;
      return Math.max(MIN_TURN_RADIUS_NM, BASE_TURN_RADIUS_NM * speedRatio * speedRatio);
    }

    function getUnassistedOptimumTriggerTime(settings) {
      const halfAngle = Math.max(settings.angleRad / 2, 0.0001);
      const spacingTime = settings.separation / Math.max(settings.speedNmPerSec, 0.0001);
      return spacingTime / Math.tan(halfAngle);
    }

    function angularDistance(a, b) {
      const diff = Math.abs(normalizeRadians(a - b));
      return Math.min(diff, (Math.PI * 2) - diff);
    }

    function isInBlindspot(observer, target, coneAngle) {
      const offset = sub(target.point, observer.point);
      if (Math.hypot(offset.x, offset.y) < 0.0001) {
        return false;
      }
      const bearing = Math.atan2(offset.y, offset.x);
      const tailBearing = observer.heading + Math.PI;
      return angularDistance(bearing, tailBearing) <= coneAngle / 2;
    }

    function computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, speed, coneAngle) {
      if (maneuverEnd <= 0) {
        return 0;
      }

      const step = clamp(maneuverEnd / 900, 0.025, 0.1);
      let total = 0;
      for (let start = 0; start < maneuverEnd; start += step) {
        const end = Math.min(maneuverEnd, start + step);
        const time = (start + end) / 2;
        const a1 = stateAt(a1Segments, time, speed);
        const a2 = stateAt(a2Segments, time, speed);
        if (isInBlindspot(a1, a2, coneAngle) || isInBlindspot(a2, a1, coneAngle)) {
          total += end - start;
        }
      }
      return total;
    }

    function buildRoute(settings) {
      if (settings.maneuverType === "unassisted") {
        return buildUnassistedRoute(settings);
      }
      if (settings.maneuverType === "assisted") {
        return buildAssistedRoute(settings);
      }
      return buildDoubleAssistedRoute(settings);
    }

    function buildDoubleAssistedRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const a1Start = { x: 0, y: -settings.sign * settings.separation / 2 };
      const a2Start = { x: 0, y: settings.sign * settings.separation / 2 };
      const overturnAngle = settings.overturnRad;
      const a1FirstAngle = settings.angleRad + overturnAngle;
      const a2FirstAngle = overturnAngle;

      const a1First = makeArc(0, a1Start, startHeading, settings.sign, a1FirstAngle, radius, settings.speedNmPerSec);
      const a2FirstStartTime = settings.firstStartMode === "outside-first" ? a1First.endTime : 0;
      const a2FirstStartPoint = add(a2Start, scale(forward(startHeading), settings.speedNmPerSec * a2FirstStartTime));
      const a2First = makeArc(a2FirstStartTime, a2FirstStartPoint, startHeading, -settings.sign, a2FirstAngle, radius, settings.speedNmPerSec);
      const a1FirstSegments = [a1First];
      const a2FirstSegments = a2FirstStartTime > 0
        ? [makeLine(0, a2Start, startHeading, a2FirstStartTime, settings.speedNmPerSec), a2First]
        : [a2First];

      function stateAfterFirst(segments, firstEndTime, time) {
        const tempSegments = segments.slice();
        appendLine(tempSegments, firstEndTime, time, settings.speedNmPerSec);
        return stateAt(tempSegments, time, settings.speedNmPerSec);
      }

      function makeTriggeredRoute(a1TriggerTime, a2TriggerTime = a1TriggerTime) {
        const safeA1TriggerTime = Math.max(a1TriggerTime, a1First.endTime);
        const safeA2TriggerTime = Math.max(a2TriggerTime, a2First.endTime);
        const a1Segments = a1FirstSegments.slice();
        appendLine(a1Segments, a1First.endTime, safeA1TriggerTime, settings.speedNmPerSec);
        const a1AtTrigger = stateAt(a1Segments, safeA1TriggerTime, settings.speedNmPerSec);
        const a1Second = makeArc(safeA1TriggerTime, a1AtTrigger.point, a1AtTrigger.heading, -settings.sign, overturnAngle, radius, settings.speedNmPerSec);
        a1Segments.push(a1Second);

        const a2Segments = a2FirstSegments.slice();
        appendLine(a2Segments, a2First.endTime, safeA2TriggerTime, settings.speedNmPerSec);
        const a2AtTrigger = stateAt(a2Segments, safeA2TriggerTime, settings.speedNmPerSec);
        const a2Second = makeArc(safeA2TriggerTime, a2AtTrigger.point, a2AtTrigger.heading, settings.sign, settings.angleRad + overturnAngle, radius, settings.speedNmPerSec);
        a2Segments.push(a2Second);

        const maneuverEnd = Math.max(a1Second.endTime, a2Second.endTime);
        appendLine(a1Segments, a1Second.endTime, maneuverEnd, settings.speedNmPerSec);
        appendLine(a2Segments, a2Second.endTime, maneuverEnd, settings.speedNmPerSec);

        const completionA1 = stateAt(a1Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionA2 = stateAt(a2Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionSpacing = distance(completionA1, completionA2);

        return {
          a1Segments,
          a2Segments,
          maneuverEnd,
          completionA1,
          completionA2,
          completionSpacing,
          a1TriggerTime: safeA1TriggerTime,
          a2TriggerTime: safeA2TriggerTime,
          triggerA1: a1AtTrigger.point,
          triggerA2: a2AtTrigger.point
        };
      }

      const equalSpacing = solveEqualSpacingDelay(
        (delay) => makeTriggeredRoute(a1First.endTime + delay, a2First.endTime + delay),
        settings.separation,
        getEqualSpacingSearchDuration(settings, a1First.duration)
      );
      let a1TriggerTime = a1First.endTime + settings.fixedWait;
      let a2TriggerTime = a1TriggerTime;
      let crossing = null;

      if (settings.mode === "cross") {
        const crossingReferenceTime = Math.max(a1First.endTime, a2First.endTime);
        const a1AtCrossingReference = stateAfterFirst(a1FirstSegments, a1First.endTime, crossingReferenceTime);
        const a2AtCrossingReference = stateAfterFirst(a2FirstSegments, a2First.endTime, crossingReferenceTime);
        crossing = solveLineIntersection(a1AtCrossingReference.point, a1AtCrossingReference.heading, a2AtCrossingReference.point, a2AtCrossingReference.heading);
        if (crossing && crossing.a1Distance >= 0) {
          a1TriggerTime = crossingReferenceTime + crossing.a1Distance / settings.speedNmPerSec;
        } else {
          a1TriggerTime = crossingReferenceTime;
        }
        a2TriggerTime = a1TriggerTime;
      } else if (settings.mode === "fixed") {
        a1TriggerTime = a1First.endTime + settings.fixedWait;
        a2TriggerTime = a2First.endTime + settings.fixedWait;
      } else if (settings.mode === "optimum") {
        a1TriggerTime = a1First.endTime + equalSpacing.delayAfterFirstComplete;
        a2TriggerTime = a2First.endTime + equalSpacing.delayAfterFirstComplete;
      }

      const selectedRoute = makeTriggeredRoute(a1TriggerTime, a2TriggerTime);

      const a1Segments = selectedRoute.a1Segments;
      const a2Segments = selectedRoute.a2Segments;
      const maneuverEnd = selectedRoute.maneuverEnd;
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        a1TriggerTime: selectedRoute.a1TriggerTime,
        a2TriggerTime: selectedRoute.a2TriggerTime,
        firstTurnCompleteTime: a1First.endTime,
        a1FirstTurnCompleteTime: a1First.endTime,
        a2FirstTurnStartTime: a2FirstStartTime,
        a2FirstTurnCompleteTime: a2First.endTime,
        totalTime,
        maneuverEnd,
        completionA1: selectedRoute.completionA1,
        completionA2: selectedRoute.completionA2,
        completionSpacing: selectedRoute.completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing,
        crossing,
        samples
      };
    }

    function buildUnassistedRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const a1Start = { x: 0, y: -settings.sign * settings.separation / 2 };
      const a2Start = { x: 0, y: settings.sign * settings.separation / 2 };

      const a1First = makeArc(0, a1Start, startHeading, settings.sign, settings.angleRad, radius, settings.speedNmPerSec);
      const a1FirstSegments = [a1First];

      function makeTriggeredRoute(a2TriggerTime) {
        const safeA2TriggerTime = Math.max(0, a2TriggerTime);
        const a1Segments = a1FirstSegments.slice();
        appendLine(a1Segments, a1First.endTime, safeA2TriggerTime, settings.speedNmPerSec);
        const a1AtTrigger = stateAt(a1Segments, safeA2TriggerTime, settings.speedNmPerSec);

        const a2Segments = [makeLine(0, a2Start, startHeading, safeA2TriggerTime, settings.speedNmPerSec)];
        const a2AtTrigger = stateAt(a2Segments, safeA2TriggerTime, settings.speedNmPerSec);
        const a2Turn = makeArc(safeA2TriggerTime, a2AtTrigger.point, a2AtTrigger.heading, settings.sign, settings.angleRad, radius, settings.speedNmPerSec);
        a2Segments.push(a2Turn);

        const maneuverEnd = Math.max(a1First.endTime, a2Turn.endTime);
        appendLine(a1Segments, Math.max(a1First.endTime, safeA2TriggerTime), maneuverEnd, settings.speedNmPerSec);
        appendLine(a2Segments, a2Turn.endTime, maneuverEnd, settings.speedNmPerSec);

        const completionA1 = stateAt(a1Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionA2 = stateAt(a2Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionSpacing = distance(completionA1, completionA2);

        return {
          a1Segments,
          a2Segments,
          maneuverEnd,
          completionA1,
          completionA2,
          completionSpacing,
          a1TriggerTime: safeA2TriggerTime,
          a2TriggerTime: safeA2TriggerTime,
          triggerA1: a1AtTrigger.point,
          triggerA2: a2AtTrigger.point
        };
      }

      const optimumTriggerTime = getUnassistedOptimumTriggerTime(settings);
      const equalSpacing = {
        available: true,
        delayAfterFirstComplete: optimumTriggerTime,
        result: makeTriggeredRoute(optimumTriggerTime)
      };

      let a2TriggerTime = a1First.endTime + settings.fixedWait;
      let crossing = null;

      if (settings.mode === "cross") {
        const a2AtA1First = stateAt([makeLine(0, a2Start, startHeading, a1First.endTime, settings.speedNmPerSec)], a1First.endTime, settings.speedNmPerSec);
        crossing = solveLineIntersection(a1First.endPoint, a1First.endHeading, a2AtA1First.point, startHeading);
        if (crossing && crossing.a1Distance >= 0) {
          a2TriggerTime = a1First.endTime + crossing.a1Distance / settings.speedNmPerSec;
        } else {
          a2TriggerTime = a1First.endTime;
        }
      } else if (settings.mode === "fixed") {
        a2TriggerTime = a1First.endTime + settings.fixedWait;
      } else if (settings.mode === "optimum") {
        a2TriggerTime = equalSpacing.delayAfterFirstComplete;
      }

      const selectedRoute = makeTriggeredRoute(a2TriggerTime);
      const a1Segments = selectedRoute.a1Segments;
      const a2Segments = selectedRoute.a2Segments;
      const maneuverEnd = selectedRoute.maneuverEnd;
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        a1TriggerTime: selectedRoute.a1TriggerTime,
        a2TriggerTime: selectedRoute.a2TriggerTime,
        firstTurnCompleteTime: a1First.endTime,
        a1FirstTurnCompleteTime: a1First.endTime,
        a2FirstTurnStartTime: 0,
        a2FirstTurnCompleteTime: 0,
        totalTime,
        maneuverEnd,
        completionA1: selectedRoute.completionA1,
        completionA2: selectedRoute.completionA2,
        completionSpacing: selectedRoute.completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing,
        crossing,
        samples
      };
    }

    function buildAssistedRoute(settings) {
      const radius = getTurnRadius(settings);
      const startHeading = 0;
      const a1Start = { x: 0, y: -settings.sign * settings.separation / 2 };
      const a2Start = { x: 0, y: settings.sign * settings.separation / 2 };
      const crossingAngle = settings.overturnRad;
      const returnAngle = settings.angleRad + crossingAngle;

      const a1First = makeArc(0, a1Start, startHeading, settings.sign, settings.angleRad, radius, settings.speedNmPerSec);
      const a2TurnInStartPoint = add(a2Start, scale(forward(startHeading), settings.speedNmPerSec * a1First.endTime));
      const a2TurnIn = makeArc(a1First.endTime, a2TurnInStartPoint, startHeading, -settings.sign, crossingAngle, radius, settings.speedNmPerSec);
      const a1FirstSegments = [a1First];
      const a2TurnInSegments = [
        makeLine(0, a2Start, startHeading, a1First.endTime, settings.speedNmPerSec),
        a2TurnIn
      ];

      function stateAfterTurnIn(segments, firstEndTime, time) {
        const tempSegments = segments.slice();
        appendLine(tempSegments, firstEndTime, time, settings.speedNmPerSec);
        return stateAt(tempSegments, time, settings.speedNmPerSec);
      }

      function makeTriggeredRoute(returnTriggerTime) {
        const safeReturnTriggerTime = Math.max(returnTriggerTime, a2TurnIn.endTime);
        const a1Segments = a1FirstSegments.slice();
        appendLine(a1Segments, a1First.endTime, safeReturnTriggerTime, settings.speedNmPerSec);
        const a1AtTrigger = stateAt(a1Segments, safeReturnTriggerTime, settings.speedNmPerSec);

        const a2Segments = a2TurnInSegments.slice();
        appendLine(a2Segments, a2TurnIn.endTime, safeReturnTriggerTime, settings.speedNmPerSec);
        const a2AtTrigger = stateAt(a2Segments, safeReturnTriggerTime, settings.speedNmPerSec);
        const a2Return = makeArc(safeReturnTriggerTime, a2AtTrigger.point, a2AtTrigger.heading, settings.sign, returnAngle, radius, settings.speedNmPerSec);
        a2Segments.push(a2Return);

        const maneuverEnd = Math.max(a1First.endTime, a2Return.endTime);
        appendLine(a1Segments, safeReturnTriggerTime, maneuverEnd, settings.speedNmPerSec);
        appendLine(a2Segments, a2Return.endTime, maneuverEnd, settings.speedNmPerSec);

        const completionA1 = stateAt(a1Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionA2 = stateAt(a2Segments, maneuverEnd, settings.speedNmPerSec).point;
        const completionSpacing = distance(completionA1, completionA2);

        return {
          a1Segments,
          a2Segments,
          maneuverEnd,
          completionA1,
          completionA2,
          completionSpacing,
          a1TriggerTime: safeReturnTriggerTime,
          a2TriggerTime: safeReturnTriggerTime,
          triggerA1: a1AtTrigger.point,
          triggerA2: a2AtTrigger.point
        };
      }

      const equalSpacing = solveEqualSpacingDelay(
        (delay) => makeTriggeredRoute(a2TurnIn.endTime + delay),
        settings.separation,
        getEqualSpacingSearchDuration(settings, Math.max(a1First.duration, a2TurnIn.duration))
      );

      let returnTriggerTime = a2TurnIn.endTime + settings.fixedWait;
      let crossing = null;

      if (settings.mode === "cross") {
        const crossingReferenceTime = Math.max(a1First.endTime, a2TurnIn.endTime);
        const a1AtCrossingReference = stateAfterTurnIn(a1FirstSegments, a1First.endTime, crossingReferenceTime);
        const a2AtCrossingReference = stateAfterTurnIn(a2TurnInSegments, a2TurnIn.endTime, crossingReferenceTime);
        crossing = solveLineIntersection(a1AtCrossingReference.point, a1AtCrossingReference.heading, a2AtCrossingReference.point, a2AtCrossingReference.heading);
        if (crossing && crossing.a1Distance >= 0) {
          returnTriggerTime = crossingReferenceTime + crossing.a1Distance / settings.speedNmPerSec;
        } else {
          returnTriggerTime = crossingReferenceTime;
        }
      } else if (settings.mode === "fixed") {
        returnTriggerTime = a2TurnIn.endTime + settings.fixedWait;
      } else if (settings.mode === "optimum") {
        returnTriggerTime = a2TurnIn.endTime + equalSpacing.delayAfterFirstComplete;
      }

      const selectedRoute = makeTriggeredRoute(returnTriggerTime);
      const a1Segments = selectedRoute.a1Segments;
      const a2Segments = selectedRoute.a2Segments;
      const maneuverEnd = selectedRoute.maneuverEnd;
      const totalTime = maneuverEnd + FINAL_LEAD_SECONDS;
      appendLine(a1Segments, maneuverEnd, totalTime, settings.speedNmPerSec);
      appendLine(a2Segments, maneuverEnd, totalTime, settings.speedNmPerSec);

      const samples = {
        a1: sampleSegments(a1Segments, totalTime, settings.speedNmPerSec),
        a2: sampleSegments(a2Segments, totalTime, settings.speedNmPerSec)
      };

      return {
        radius,
        a1Segments,
        a2Segments,
        a1Start,
        a2Start,
        a1TriggerTime: selectedRoute.a1TriggerTime,
        a2TriggerTime: selectedRoute.a2TriggerTime,
        firstTurnCompleteTime: a1First.endTime,
        a1FirstTurnCompleteTime: a1First.endTime,
        a2FirstTurnStartTime: a2TurnIn.startTime,
        a2FirstTurnCompleteTime: a2TurnIn.endTime,
        totalTime,
        maneuverEnd,
        completionA1: selectedRoute.completionA1,
        completionA2: selectedRoute.completionA2,
        completionSpacing: selectedRoute.completionSpacing,
        blindspotTime: computeBlindspotTime(a1Segments, a2Segments, maneuverEnd, settings.speedNmPerSec, settings.blindspotRad),
        equalSpacing,
        crossing,
        samples
      };
    }

    function sampleSegments(segments, totalTime, speed) {
      const step = clamp(totalTime / 700, 0.035, 0.16);
      const points = [];
      for (let time = 0; time < totalTime; time += step) {
        const state = stateAt(segments, time, speed);
        points.push({ time, x: state.point.x, y: state.point.y });
      }
      const finalState = stateAt(segments, totalTime, speed);
      points.push({ time: totalTime, x: finalState.point.x, y: finalState.point.y });
      return points;
    }

    function resizeCanvas() {
      const rect = elements.stage.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      viewport = {
        width: Math.max(1, rect.width),
        height: Math.max(1, rect.height),
        dpr
      };
      elements.canvas.width = Math.round(viewport.width * dpr);
      elements.canvas.height = Math.round(viewport.height * dpr);
      elements.canvas.style.width = `${viewport.width}px`;
      elements.canvas.style.height = `${viewport.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function makeTransform() {
      const all = route.samples.a1.concat(route.samples.a2, [
        { x: route.a1Start.x, y: route.a1Start.y },
        { x: route.a2Start.x, y: route.a2Start.y }
      ]);
      let minX = Math.min(...all.map((point) => point.x));
      let maxX = Math.max(...all.map((point) => point.x));
      let minY = Math.min(...all.map((point) => point.y));
      let maxY = Math.max(...all.map((point) => point.y));
      const margin = Math.max(0.35, params.separation * 0.4, route.radius * 0.3);
      minX -= margin;
      maxX += margin;
      minY -= margin;
      maxY += margin;

      const worldWidth = Math.max(0.1, maxX - minX);
      const worldHeight = Math.max(0.1, maxY - minY);
      const canvasAspect = viewport.width / viewport.height;
      const worldAspect = worldWidth / worldHeight;

      if (worldAspect < canvasAspect) {
        const expandedWidth = worldHeight * canvasAspect;
        const extra = (expandedWidth - worldWidth) / 2;
        minX -= extra;
        maxX += extra;
      } else {
        const expandedHeight = worldWidth / canvasAspect;
        const extra = (expandedHeight - worldHeight) / 2;
        minY -= extra;
        maxY += extra;
      }

      const scaleFactor = viewport.width / (maxX - minX);
      return {
        minX,
        maxX,
        minY,
        maxY,
        scale: scaleFactor,
        toScreen(point) {
          return {
            x: (point.x - minX) * scaleFactor,
            y: (maxY - point.y) * scaleFactor
          };
        }
      };
    }

    function draw() {
      if (!route || viewport.width <= 1) {
        return;
      }

      ctx.clearRect(0, 0, viewport.width, viewport.height);
      const transform = makeTransform();
      drawGrid(transform);
      drawInitialSeparation(transform);
      if (params.showBlindspots) {
        drawBlindspots(transform);
      }
      drawAircraftPath(route.samples.a1, elapsed, "var(--a1)", "rgba(217, 95, 67, 0.28)", transform);
      drawAircraftPath(route.samples.a2, elapsed, "var(--a2)", "rgba(31, 122, 140, 0.28)", transform);
      drawTriggerMarkers(transform);
      drawCompletionSpacing(transform);

      const a1 = stateAt(route.a1Segments, elapsed, params.speedNmPerSec);
      const a2 = stateAt(route.a2Segments, elapsed, params.speedNmPerSec);
      drawAircraft(a1.point, a1.heading, "#d95f43", "A1", transform);
      drawAircraft(a2.point, a2.heading, "#1f7a8c", "A2", transform);
    }

    function drawBlindspots(transform) {
      const range = Math.max(0.8, params.separation * 1.35, route.radius * 1.7);
      const a1 = stateAt(route.a1Segments, elapsed, params.speedNmPerSec);
      const a2 = stateAt(route.a2Segments, elapsed, params.speedNmPerSec);
      drawBlindspotCone(a1.point, a1.heading, range, "rgba(217, 95, 67, 0.14)", "rgba(217, 95, 67, 0.28)", transform);
      drawBlindspotCone(a2.point, a2.heading, range, "rgba(31, 122, 140, 0.14)", "rgba(31, 122, 140, 0.28)", transform);
    }

    function drawBlindspotCone(point, heading, range, fillColor, strokeColor, transform) {
      const center = transform.toScreen(point);
      const tailHeading = heading + Math.PI;
      const halfCone = params.blindspotRad / 2;
      const steps = 12;

      ctx.save();
      ctx.fillStyle = fillColor;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(center.x, center.y);
      for (let index = 0; index <= steps; index += 1) {
        const amount = index / steps;
        const coneHeading = tailHeading - halfCone + params.blindspotRad * amount;
        const edge = transform.toScreen(add(point, scale(forward(coneHeading), range)));
        ctx.lineTo(edge.x, edge.y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function cssColor(value) {
      if (!value.startsWith("var(")) {
        return value;
      }
      const name = value.slice(4, -1).trim();
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawGrid(transform) {
      const gridStep = chooseGridStep((transform.maxX - transform.minX) / 8);
      ctx.save();
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#e2e8e5";
      ctx.fillStyle = "#7d8782";
      ctx.font = "12px Inter, system-ui, sans-serif";
      ctx.textBaseline = "middle";

      const startX = Math.floor(transform.minX / gridStep) * gridStep;
      for (let x = startX; x <= transform.maxX; x += gridStep) {
        const a = transform.toScreen({ x, y: transform.minY });
        const b = transform.toScreen({ x, y: transform.maxY });
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      const startY = Math.floor(transform.minY / gridStep) * gridStep;
      for (let y = startY; y <= transform.maxY; y += gridStep) {
        const a = transform.toScreen({ x: transform.minX, y });
        const b = transform.toScreen({ x: transform.maxX, y });
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      drawScaleBar(transform, gridStep);
      ctx.restore();
    }

    function chooseGridStep(raw) {
      const steps = [0.25, 0.5, 1, 2, 5, 10];
      return steps.find((step) => step >= raw) || 10;
    }

    function drawScaleBar(transform, gridStep) {
      const length = gridStep;
      const start = transform.toScreen({
        x: transform.minX + (transform.maxX - transform.minX) * 0.06,
        y: transform.minY + (transform.maxY - transform.minY) * 0.08
      });
      const end = {
        x: start.x + length * transform.scale,
        y: start.y
      };
      ctx.strokeStyle = "#6d7773";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.moveTo(start.x, start.y - 5);
      ctx.lineTo(start.x, start.y + 5);
      ctx.moveTo(end.x, end.y - 5);
      ctx.lineTo(end.x, end.y + 5);
      ctx.stroke();
      ctx.fillStyle = "#596460";
      ctx.textAlign = "center";
      const label = Number.isInteger(length) ? `${length} NM` : `${length.toFixed(2)} NM`;
      ctx.fillText(label, (start.x + end.x) / 2, start.y - 16);
    }

    function drawInitialSeparation(transform) {
      const xOffset = -Math.max(0.18, params.separation * 0.14);
      const p1 = transform.toScreen({ x: xOffset, y: route.a1Start.y });
      const p2 = transform.toScreen({ x: xOffset, y: route.a2Start.y });
      ctx.save();
      ctx.strokeStyle = "#48524e";
      ctx.fillStyle = "#48524e";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(p1.x - 8, p1.y);
      ctx.lineTo(p1.x + 8, p1.y);
      ctx.moveTo(p2.x - 8, p2.y);
      ctx.lineTo(p2.x + 8, p2.y);
      ctx.stroke();
      ctx.font = "700 12px Inter, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(formatNm(params.separation), p1.x + 12, (p1.y + p2.y) / 2);
      ctx.restore();
    }

    function drawTriggerMarkers(transform) {
      const markers = getTriggerSnapshots();
      const drawnTimes = [];

      markers.forEach((item) => {
        const duplicateLine = drawnTimes.some((time) => Math.abs(time - item.time) < 0.05);
        drawTriggerSnapshot(item, transform, duplicateLine);
        drawnTimes.push(item.time);
      });
    }

    function getTriggerSnapshots() {
      const a1AtA1Trigger = stateAt(route.a1Segments, route.a1TriggerTime, params.speedNmPerSec);
      const a2AtA1Trigger = stateAt(route.a2Segments, route.a1TriggerTime, params.speedNmPerSec);
      const a2AtA2Trigger = stateAt(route.a2Segments, route.a2TriggerTime, params.speedNmPerSec);
      const a1AtA2Trigger = stateAt(route.a1Segments, route.a2TriggerTime, params.speedNmPerSec);
      const insideFirstCue = getInsideFirstTurnCueSnapshot();
      const insideTurnMarker = {
        id: "a2",
        trigger: a2AtA2Trigger,
        ghost: a1AtA2Trigger,
        triggerLabel: "",
        ghostLabel: "",
        ghostColor: "#d95f43",
        time: route.a2TriggerTime
      };

      if (params.maneuverType === "assisted" || params.maneuverType === "unassisted") {
        return params.maneuverType === "assisted" && insideFirstCue
          ? [insideFirstCue, insideTurnMarker]
          : [insideTurnMarker];
      }
      const markers = [
        {
          id: "a1",
          trigger: a1AtA1Trigger,
          ghost: a2AtA1Trigger,
          triggerLabel: "",
          ghostLabel: "",
          ghostColor: "#1f7a8c",
          time: route.a1TriggerTime
        },
        insideTurnMarker
      ];
      if (insideFirstCue && params.firstStartMode === "outside-first") {
        markers.unshift(insideFirstCue);
      }
      return markers;
    }

    function getInsideFirstTurnCueSnapshot() {
      if (typeof route.a2FirstTurnStartTime !== "number" || route.a2FirstTurnStartTime <= 0.0001) {
        return null;
      }
      const a2AtCue = stateAt(route.a2Segments, route.a2FirstTurnStartTime, params.speedNmPerSec);
      const a1AtCue = stateAt(route.a1Segments, route.a2FirstTurnStartTime, params.speedNmPerSec);
      return {
        id: "a2-first",
        trigger: a2AtCue,
        ghost: a1AtCue,
        triggerLabel: "",
        ghostLabel: "",
        ghostColor: "#d95f43",
        cueText: "Cue: A1 levels wings",
        time: route.a2FirstTurnStartTime
      };
    }

    function drawTriggerSnapshot(item, transform, duplicateLine) {
      const triggerPoint = transform.toScreen(item.trigger.point);
      const ghostPoint = transform.toScreen(item.ghost.point);
      const active = activeTrigger === item.id;
      const triggerColor = item.id === "a1" ? "#d95f43" : "#2e6f58";

      ctx.save();
      ctx.lineWidth = active ? 2.5 : 1.5;
      ctx.strokeStyle = triggerColor;
      ctx.fillStyle = "#645c57";
      if (!duplicateLine || active) {
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(triggerPoint.x, triggerPoint.y);
        ctx.lineTo(ghostPoint.x, ghostPoint.y);
        ctx.stroke();
      }

      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.arc(triggerPoint.x, triggerPoint.y, active ? 10 : 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.restore();

      if (active) {
        drawTriggerDistanceLabel(
          triggerPoint,
          ghostPoint,
          distance(item.trigger.point, item.ghost.point),
          getClockCue(item),
          item.cueText || "",
          triggerColor
        );
      }

      drawGhostAircraft(item.ghost.point, item.ghost.heading, item.ghostColor, item.ghostLabel, transform);
    }

    function getClockCue(item) {
      const vector = sub(item.ghost.point, item.trigger.point);
      const bearing = Math.atan2(vector.y, vector.x);
      const relativeClockwise = normalizeRadians(item.trigger.heading - bearing);
      const clockIndex = Math.round(relativeClockwise / (Math.PI / 6)) % 12;
      const clockPoint = clockIndex === 0 ? 12 : clockIndex;
      return `${clockPoint} o'clock`;
    }

    function drawTriggerDistanceLabel(triggerPoint, ghostPoint, spacing, clockCue, cueText, labelColor) {
      const mid = {
        x: (triggerPoint.x + ghostPoint.x) / 2,
        y: (triggerPoint.y + ghostPoint.y) / 2
      };
      const labels = [formatNm(spacing), clockCue];
      if (cueText) {
        labels.push(cueText);
      }

      ctx.save();
      ctx.font = "800 12px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const metrics = labels.map((label) => ctx.measureText(label).width);
      const boxWidth = Math.max(...metrics) + 18;
      const lineHeight = 16;
      const boxHeight = labels.length * lineHeight + 11;
      const labelX = clamp(mid.x, boxWidth / 2 + 8, viewport.width - boxWidth / 2 - 8);
      const labelY = clamp(mid.y - 18, boxHeight / 2 + 8, viewport.height - boxHeight / 2 - 8);
      ctx.fillStyle = "rgba(255, 255, 255, 0.94)";
      ctx.strokeStyle = "#2e6f58";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(labelX - boxWidth / 2, labelY - boxHeight / 2, boxWidth, boxHeight, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = labelColor;
      const firstLineY = labelY - ((labels.length - 1) * lineHeight) / 2;
      labels.forEach((label, index) => {
        ctx.fillText(label, labelX, firstLineY + index * lineHeight);
      });
      ctx.restore();
    }

    function drawCompletionSpacing(transform) {
      const p1 = transform.toScreen(route.completionA1);
      const p2 = transform.toScreen(route.completionA2);
      const mid = {
        x: (p1.x + p2.x) / 2,
        y: (p1.y + p2.y) / 2
      };
      const label = formatNm(route.completionSpacing);

      ctx.save();
      ctx.strokeStyle = "#2f3a36";
      ctx.fillStyle = "#2f3a36";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(p1.x, p1.y, 4, 0, Math.PI * 2);
      ctx.arc(p2.x, p2.y, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.font = "700 12px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const metrics = ctx.measureText(label);
      const boxWidth = metrics.width + 16;
      const boxHeight = 24;
      const labelY = mid.y - 18;
      ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
      ctx.strokeStyle = "#d8dfdc";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(mid.x - boxWidth / 2, labelY - boxHeight / 2, boxWidth, boxHeight, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#2f3a36";
      ctx.fillText(label, mid.x, labelY);
      ctx.restore();
    }

    function drawAircraftPath(points, splitTime, pastColor, futureColor, transform) {
      const past = [];
      const future = [];
      for (const point of points) {
        if (point.time <= splitTime) {
          past.push(point);
        } else {
          future.push(point);
        }
      }

      const currentState = pointAtSamples(points, splitTime);
      if (currentState) {
        past.push(currentState);
        future.unshift(currentState);
      }

      drawPolyline(future, futureColor, transform, [9, 8], 3);
      drawPolyline(past, cssColor(pastColor), transform, [], 4);
    }

    function pointAtSamples(points, time) {
      if (time <= 0) {
        return points[0];
      }
      for (let index = 1; index < points.length; index += 1) {
        const prev = points[index - 1];
        const next = points[index];
        if (next.time >= time) {
          const amount = (time - prev.time) / Math.max(0.0001, next.time - prev.time);
          return {
            time,
            x: prev.x + (next.x - prev.x) * amount,
            y: prev.y + (next.y - prev.y) * amount
          };
        }
      }
      return points[points.length - 1];
    }

    function drawPolyline(points, color, transform, dash, width) {
      if (points.length < 2) {
        return;
      }
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.setLineDash(dash);
      ctx.beginPath();
      const first = transform.toScreen(points[0]);
      ctx.moveTo(first.x, first.y);
      for (let index = 1; index < points.length; index += 1) {
        const point = transform.toScreen(points[index]);
        ctx.lineTo(point.x, point.y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawGhostAircraft(point, heading, color, label, transform) {
      const p = transform.toScreen(point);
      const angle = -heading;
      const length = 30;
      const width = 16;
      const tail = 12;
      const shape = [
        { x: length / 2, y: 0 },
        { x: -tail, y: width / 2 },
        { x: -tail / 2, y: 0 },
        { x: -tail, y: -width / 2 }
      ];

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.globalAlpha = 0.38;
      ctx.fillStyle = color;
      ctx.beginPath();
      shape.forEach((vertex, index) => {
        if (index === 0) {
          ctx.moveTo(vertex.x, vertex.y);
        } else {
          ctx.lineTo(vertex.x, vertex.y);
        }
      });
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      if (label) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.72;
        ctx.font = "800 11px Inter, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, p.x, p.y + 24);
        ctx.restore();
      }
    }

    function drawAircraft(point, heading, color, label, transform) {
      const p = transform.toScreen(point);
      const angle = -heading;
      const length = 34;
      const width = 18;
      const tail = 13;
      const shape = [
        { x: length / 2, y: 0 },
        { x: -tail, y: width / 2 },
        { x: -tail / 2, y: 0 },
        { x: -tail, y: -width / 2 }
      ];

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.fillStyle = color;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      shape.forEach((vertex, index) => {
        if (index === 0) {
          ctx.moveTo(vertex.x, vertex.y);
        } else {
          ctx.lineTo(vertex.x, vertex.y);
        }
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.fillStyle = "#18211f";
      ctx.font = "800 12px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, p.x, p.y - 27);
      ctx.restore();
    }

    function updateOutputs() {
      elements.pageTitle.textContent = getManeuverTitle();
      updateManeuverInfo();
      elements.secondTurnHeading.textContent = getSecondTurnHeading();
      elements.turnAngleValue.value = formatDegrees(params.angleDeg);
      elements.overturnValue.value = formatDegrees(params.overturnDeg);
      elements.separationValue.value = formatNm(params.separation);
      elements.speedValue.value = `${params.speedKts.toFixed(0)} kt`;
      elements.fixedWaitValue.value = formatSeconds(params.fixedWait);
      elements.blindspotSizeValue.value = formatDegrees(params.blindspotDeg);
      elements.timeSlider.max = route.totalTime.toFixed(1);
      elements.timeSlider.value = elapsed.toFixed(1);
      elements.timeReadout.value = `${elapsed.toFixed(1)} / ${route.totalTime.toFixed(1)} s`;
      elements.elapsedLarge.textContent = formatSeconds(elapsed);
      elements.turnTimeSummary.textContent = `Turn time ${route.maneuverEnd.toFixed(1)} s`;
      elements.blindspotTimeSummary.textContent = `Time in blindspot ${formatSeconds(route.blindspotTime)}`;
      elements.radiusSummary.textContent = `Radius ${route.radius.toFixed(2)} NM`;
      elements.completionSpacingSummary.textContent = `Spacing ${formatNm(route.completionSpacing)}`;
      elements.firstTurnGroup.hidden = params.maneuverType !== "double";
      elements.overturnGroup.hidden = params.maneuverType === "unassisted";
      elements.overturn.disabled = params.lockOverturnToHalf;
      elements.fixedWaitLabel.textContent = getFixedWaitLabel();
      const fixed = params.mode === "fixed";
      elements.fixedWait.disabled = !fixed;
      elements.fixedWaitGroup.classList.toggle("disabled", !fixed);
    }

    function getManeuverTitle() {
      if (params.maneuverType === "unassisted") {
        return "Unassisted Tactical Turn";
      }
      if (params.maneuverType === "assisted") {
        return "Assisted Tactical Turn";
      }
      return "Double Assisted Tactical Turn";
    }

    function getSecondTurnHeading() {
      if (params.maneuverType === "unassisted") {
        return "Inside turn";
      }
      if (params.maneuverType === "assisted") {
        return "Return turn";
      }
      return "Second turn";
    }

    function getFixedWaitLabel() {
      if (params.maneuverType === "unassisted") {
        return "Wait after A1 turn";
      }
      if (params.maneuverType === "assisted") {
        return "Wait after A2 turn-in";
      }
      return "Wait after first turn completed";
    }

    function getManeuverInfo() {
      if (params.maneuverType === "unassisted") {
        return {
          description: [
            "Outside aircraft turns onto heading. Inside aircraft turns onto heading."
          ],
          pros: [
            "Very easy",
            "Reliable 90 degree turn using crossing visual cues.",
            "Both aircraft traverse the same distance."
          ],
          cons: [
            "Takes more time and more space, especially at shallower turn angles."
          ]
        };
      }
      if (params.maneuverType === "assisted") {
        return {
          description: [
            "Outside aircraft makes the turn. Inside aircraft waits for outside aircraft's turn to complete (wings level) and turns across the front, then turns back to roll out on final heading."
          ],
          pros: [
            "Easy for outside aircraft."
          ],
          cons: [
            "Inside aircraft travels further and will fall behind slightly if speed is maintained.",
            "Takes a little longer."
          ]
        };
      }
      return {
        description: [
          "Both aircraft turn in to each other. Outside aircraft overturns beyond the final heading. Inside aircraft turns by the overturn amount."
        ],
        pros: [
          "Same distance travelled.",
          "Fast (maintain visual cross cover, less space needed)"
        ],
        cons: [
          "More complex"
        ]
      };
    }

    function updateManeuverInfo() {
      const info = getManeuverInfo();
      const nodes = [];

      info.description.forEach((text) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        nodes.push(paragraph);
      });

      info.pros.forEach((text) => {
        nodes.push(makeInfoItem("+", text, "info-pro"));
      });

      info.cons.forEach((text) => {
        nodes.push(makeInfoItem("-", text, "info-con"));
      });

      elements.maneuverInfo.replaceChildren(...nodes);
    }

    function makeInfoItem(prefix, text, className) {
      const item = document.createElement("div");
      item.className = `info-item ${className}`;
      item.textContent = `${prefix} ${text}`;
      return item;
    }

    function setInfoOpen(open) {
      elements.maneuverInfo.hidden = !open;
      elements.infoToggle.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function rebuild() {
      params = readParams();
      route = buildRoute(params);
      elapsed = clamp(elapsed, 0, route.totalTime);
      updateOutputs();
      draw();
    }

    function setElapsed(value) {
      elapsed = clamp(value, 0, route.totalTime);
      updateOutputs();
      draw();
    }

    function setPlaying(next) {
      playing = next;
      lastFrameTime = 0;
      elements.playPause.setAttribute("aria-label", playing ? "Pause" : "Play");
      elements.playPause.setAttribute("title", playing ? "Pause" : "Play");
      elements.playPause.firstElementChild.className = playing ? "pause-symbol" : "play-symbol";
      if (playing) {
        requestAnimationFrame(tick);
      }
    }

    function tick(timestamp) {
      if (!playing) {
        return;
      }
      if (!lastFrameTime) {
        lastFrameTime = timestamp;
      }
      const deltaSeconds = (timestamp - lastFrameTime) / 1000;
      lastFrameTime = timestamp;
      setElapsed(elapsed + deltaSeconds);
      if (elapsed >= route.totalTime) {
        setPlaying(false);
        return;
      }
      requestAnimationFrame(tick);
    }

    function handleCanvasClick(event) {
      const hit = findTriggerHit(event);
      activeTrigger = hit ? hit.id : null;
      draw();
    }

    function handleCanvasMove(event) {
      elements.canvas.style.cursor = findTriggerHit(event) ? "pointer" : "default";
    }

    function findTriggerHit(event) {
      if (!route || viewport.width <= 1) {
        return null;
      }

      const rect = elements.canvas.getBoundingClientRect();
      const point = {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
      const transform = makeTransform();
      const markers = getTriggerSnapshots();
      let best = null;
      let bestDistance = Infinity;

      markers.forEach((marker) => {
        const screen = transform.toScreen(marker.trigger.point);
        const gap = Math.hypot(point.x - screen.x, point.y - screen.y);
        if (gap < bestDistance) {
          best = marker;
          bestDistance = gap;
        }
      });

      return bestDistance <= 16 ? best : null;
    }

    function wireControls() {
      [elements.turnAngle, elements.overturn, elements.separation, elements.speed, elements.fixedWait].forEach((control) => {
        control.addEventListener("input", rebuild);
      });

      elements.overturnHalfAngle.addEventListener("change", rebuild);

      document.querySelectorAll("input[name='maneuver'], input[name='direction'], input[name='firstStart'], input[name='mode']").forEach((control) => {
        control.addEventListener("change", rebuild);
      });

      document.querySelectorAll(".segmented span").forEach((span) => {
        span.addEventListener("keydown", (event) => {
          if (event.key === " " || event.key === "Enter") {
            event.preventDefault();
            span.previousElementSibling.checked = true;
            span.previousElementSibling.dispatchEvent(new Event("change", { bubbles: true }));
          }
        });
      });

      elements.timeSlider.addEventListener("input", () => {
        setElapsed(Number(elements.timeSlider.value));
      });

      elements.blindspotSize.addEventListener("input", rebuild);
      elements.showBlindspots.addEventListener("change", rebuild);

      elements.canvas.addEventListener("click", handleCanvasClick);
      elements.canvas.addEventListener("mousemove", handleCanvasMove);
      elements.canvas.addEventListener("mouseleave", () => {
        elements.canvas.style.cursor = "default";
      });

      elements.infoToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        setInfoOpen(elements.infoToggle.getAttribute("aria-expanded") !== "true");
      });

      elements.maneuverInfo.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      document.addEventListener("click", () => {
        setInfoOpen(false);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setInfoOpen(false);
          elements.infoToggle.blur();
        }
      });

      elements.playPause.addEventListener("click", () => {
        if (!playing && elapsed >= route.totalTime - 0.05) {
          setElapsed(0);
        }
        setPlaying(!playing);
      });
    }

    wireControls();

    if ("ResizeObserver" in window) {
      new ResizeObserver(resizeCanvas).observe(elements.stage);
    } else {
      window.addEventListener("resize", resizeCanvas);
    }

    rebuild();
    resizeCanvas();
  </script>
</body>
</html>
